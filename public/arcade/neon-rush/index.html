<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON RUSH</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;700&display=swap');
:root{
  --nc:#00f5ff;--np:#ff00aa;--ng:#39ff14;--ny:#ffee00;--npu:#bf00ff;--no:#ff6600;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#050008;font-family:'Orbitron',sans-serif;overflow:hidden;height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  touch-action:manipulation;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;}
/* LEVEL SELECT */
#levelSelect{position:fixed;inset:0;background:#050008;display:flex;flex-direction:column;
  align-items:center;justify-content:flex-start;padding:28px 20px;overflow-y:auto;z-index:200;}
#levelSelect h1{font-size:40px;font-weight:900;letter-spacing:8px;margin-bottom:4px;
  background:linear-gradient(90deg,var(--nc),var(--np));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
#levelSelect .sub{font-family:'Rajdhani',sans-serif;font-size:13px;color:rgba(255,255,255,.35);
  letter-spacing:4px;margin-bottom:24px;}
#levelGrid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;width:100%;max-width:900px;}
.lc{border:1px solid rgba(255,255,255,.1);border-radius:7px;padding:13px 10px;cursor:pointer;
  transition:all .18s;position:relative;overflow:hidden;background:rgba(255,255,255,.025);}
.lc:hover{transform:translateY(-3px);box-shadow:0 0 18px rgba(0,245,255,.18);}
.lc .ln{font-size:21px;font-weight:900;margin-bottom:3px;}
.lc .lname{font-family:'Rajdhani',sans-serif;font-size:10px;letter-spacing:2px;
  color:rgba(255,255,255,.5);margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lc .ld{font-size:8px;font-family:'Rajdhani',sans-serif;letter-spacing:2px;padding:2px 5px;border-radius:3px;display:inline-block;}
.de{background:rgba(57,255,20,.15);color:#39ff14;}
.dm{background:rgba(255,238,0,.15);color:#ffee00;}
.dh{background:rgba(255,102,0,.15);color:#ff6600;}
.di{background:rgba(255,0,170,.15);color:#ff00aa;}
.lc .lb{font-family:'Rajdhani',sans-serif;font-size:9px;color:rgba(255,255,255,.28);margin-top:3px;letter-spacing:1px;}
.lc.done{border-color:rgba(57,255,20,.35);}
.lc.done::after{content:'✓';position:absolute;top:5px;right:7px;color:#39ff14;font-size:11px;}
/* GAME */
#gw{position:relative;width:900px;max-width:100vw;display:none;}
#hud{display:flex;justify-content:space-between;align-items:center;padding:7px 16px;
  background:rgba(0,0,0,.7);border:1px solid rgba(0,245,255,.2);border-bottom:none;border-radius:8px 8px 0 0;}
#sd,#bd{font-size:11px;color:#555;letter-spacing:2px;}
#sd span,#bd span{color:var(--nc);font-size:15px;font-weight:900;margin-left:5px;}
#hc{display:flex;flex-direction:column;align-items:center;gap:2px;}
#ln2{font-size:9px;letter-spacing:3px;}
#lt{font-family:'Rajdhani',sans-serif;font-size:11px;color:rgba(255,255,255,.35);letter-spacing:2px;}
#pbc{height:5px;background:rgba(255,255,255,.04);border-left:1px solid rgba(0,245,255,.18);border-right:1px solid rgba(0,245,255,.18);}
#pb{height:100%;width:0%;background:linear-gradient(90deg,var(--nc),var(--np));transition:width .08s linear;}
#gc{display:block;border:1px solid rgba(0,245,255,.22);border-top:none;border-radius:0 0 8px 8px;}
#pc{position:absolute;top:56px;left:0;width:900px;height:450px;pointer-events:none;z-index:5;}
#sl{position:absolute;top:56px;left:0;width:100%;height:450px;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.07) 2px,rgba(0,0,0,.07) 4px);
  z-index:10;border-radius:0 0 8px 8px;}
#gw,#gc,#pc,#sl,.ov,.btn{touch-action:none;}
#ad{position:absolute;top:67px;left:15px;font-size:9px;color:rgba(255,255,255,.22);letter-spacing:2px;}
/* OVERLAYS */
.ov{position:absolute;top:56px;left:0;right:0;bottom:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;background:rgba(5,0,20,.93);border-radius:0 0 8px 8px;z-index:100;gap:14px;}
.ov h1{font-size:40px;font-weight:900;letter-spacing:7px;
  background:linear-gradient(135deg,var(--nc),var(--np),var(--nc));background-size:200%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:gs 3s ease infinite;text-align:center;}
.ov h2{font-size:19px;color:var(--np);letter-spacing:5px;animation:pu 1.5s ease-in-out infinite;}
.ov p{font-family:'Rajdhani',sans-serif;font-size:12px;color:rgba(255,255,255,.4);letter-spacing:3px;text-align:center;line-height:1.9;}
.hint{font-family:'Rajdhani',sans-serif;font-size:11px;color:rgba(0,245,255,.6);letter-spacing:2px;animation:bl 1s step-end infinite;}
.sr{display:flex;gap:28px;}
.st{display:flex;flex-direction:column;align-items:center;gap:3px;}
.sl2{font-family:'Rajdhani',sans-serif;font-size:10px;color:rgba(255,255,255,.32);letter-spacing:3px;}
.sv{font-size:24px;font-weight:900;color:var(--ny);text-shadow:0 0 18px var(--ny);}
.br{display:flex;gap:12px;margin-top:2px;}
.btn{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:2px;padding:8px 18px;
  border-radius:4px;cursor:pointer;border:none;transition:all .14s;}
.bp{background:linear-gradient(90deg,var(--nc),var(--npu));color:#000;font-weight:700;}
.bp:hover{box-shadow:0 0 18px var(--nc);transform:scale(1.04);}
.bs{background:transparent;border:1px solid rgba(255,255,255,.18);color:rgba(255,255,255,.55);}
.bs:hover{border-color:var(--np);color:var(--np);}
@keyframes gs{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes bl{0%,100%{opacity:1}50%{opacity:0}}
</style>
</head>
<body>

<div id="levelSelect">
  <h1>NEON RUSH</h1>
  <div class="sub">SELECT LEVEL</div>
  <div id="levelGrid"></div>
</div>

<div id="gw">
  <div id="hud">
    <div id="sd">SCORE <span id="sc">0</span></div>
    <div id="hc"><div id="ln2">LEVEL 1</div><div id="lt">00:00</div></div>
    <div id="bd">BEST <span id="bt">0</span></div>
  </div>
  <div id="pbc"><div id="pb"></div></div>
  <canvas id="gc" width="900" height="450"></canvas>
  <canvas id="pc" width="900" height="450"></canvas>
  <div id="sl"></div>
  <div id="ad">ATTEMPT #<span id="at">1</span></div>

  <div class="ov" id="ss">
    <h1>NEON RUSH</h1>
    <h2 id="st2">LEVEL 1 — STARFALL</h2>
    <p>SPACE / CLICK / TAP TO JUMP<br>TAP AGAIN IN AIR FOR ASSIST JUMP</p>
    <div class="hint">[ PRESS SPACE OR TAP ANYWHERE TO START ]</div>
  </div>

  <div class="ov" id="ds" style="display:none">
    <h2 style="font-size:26px">CRASHED</h2>
    <div class="sr">
      <div class="st"><div class="sl2">PROGRESS</div><div class="sv" id="dp">0%</div></div>
      <div class="st"><div class="sl2">SCORE</div><div class="sv" id="dsc">0</div></div>
      <div class="st"><div class="sl2">BEST</div><div class="sv" id="dbt">0</div></div>
    </div>
    <div class="br">
      <button class="btn bp" onclick="restartGame()">RETRY</button>
      <button class="btn bs" onclick="goLS()">LEVELS</button>
    </div>
  </div>

  <div class="ov" id="ws" style="display:none">
    <h1 style="font-size:30px">COMPLETE!</h1>
    <div class="sr">
      <div class="st"><div class="sl2">TIME</div><div class="sv" id="wt">0:00</div></div>
      <div class="st"><div class="sl2">SCORE</div><div class="sv" id="wsc">0</div></div>
      <div class="st"><div class="sl2">TRIES</div><div class="sv" id="wat">0</div></div>
    </div>
    <div class="br">
      <button class="btn bp" id="bnn" onclick="nextLv()">NEXT</button>
      <button class="btn bs" onclick="goLS()">LEVELS</button>
    </div>
  </div>
</div>

<script>
// ── CONSTANTS ─────────────────────────────────────────────────
const W=900,H=450,GR=H-80,T=40;
const GV=0.56,JF=-13.6,MS=6.00,JPF=-19.0;
const TERMINAL_VY=17;
const COYOTE_FRAMES=8;
const JUMP_BUFFER_FRAMES=9;
const AIR_JUMPS_MAX=1;
const AIR_JUMP_FORCE=-11.8;
const ASSIST_AFTER_ATTEMPTS=4;
const ASSIST_MIN=0.74;
const S=40,B=T;
// jump arc: ~203px wide, ~140px peak  |  jumppad: ~266px wide, ~249px peak

// ── LEVEL META ────────────────────────────────────────────────
const META=[
 {n:'STARFALL',   d:'easy',  e:'neon',   c:'#00f5ff',a:'#bf00ff'},
 {n:'ACID RAIN',  d:'easy',  e:'acid',   c:'#39ff14',a:'#ffee00'},
 {n:'DEEP SPACE', d:'easy',  e:'space',  c:'#4488ff',a:'#00f5ff'},
 {n:'EMBER PATH', d:'medium',e:'fire',   c:'#ff6600',a:'#ffee00'},
 {n:'ICE CAVES',  d:'medium',e:'ice',    c:'#88ddff',a:'#ffffff'},
 {n:'GLITCH ZONE',d:'medium',e:'glitch', c:'#ff00aa',a:'#00f5ff'},
 {n:'TOXIC SWAMP',d:'medium',e:'toxic',  c:'#88ff00',a:'#ff6600'},
 {n:'BLOOD MOON', d:'hard',  e:'blood',  c:'#ff2200',a:'#ff8800'},
 {n:'VOID WALK',  d:'hard',  e:'void',   c:'#6600ff',a:'#ff00aa'},
 {n:'STORM GRID', d:'hard',  e:'storm',  c:'#ffee00',a:'#00f5ff'},
 {n:'NEON TOMB',  d:'hard',  e:'tomb',   c:'#00ffaa',a:'#ff00aa'},
 {n:'WARP DRIVE', d:'hard',  e:'warp',   c:'#ff44ff',a:'#00f5ff'},
 {n:'LAVA FLOW',  d:'insane',e:'lava',   c:'#ff4400',a:'#ffaa00'},
 {n:'DARK PULSE', d:'insane',e:'dark',   c:'#aa00ff',a:'#ff00aa'},
 {n:'NEON STORM', d:'insane',e:'nstorm', c:'#00f5ff',a:'#ff6600'},
 {n:'CRYSTAL MAZE',d:'insane',e:'crystal',c:'#88ffff',a:'#ff88ff'},
 {n:'OMEGA RUN',  d:'insane',e:'omega',  c:'#ff0044',a:'#ffee00'},
 {n:'MIRROR WORLD',d:'insane',e:'mirror',c:'#ffffff',a:'#888888'},
 {n:'THE ABYSS',  d:'insane',e:'abyss',  c:'#6644ff',a:'#ff00aa'},
 {n:'FINAL RUSH', d:'insane',e:'final',  c:'#ff00aa',a:'#ffee00'},
];

// ── ENV THEMES ────────────────────────────────────────────────
const ENV={
 neon:   {bg:'#0a0015',g2:'#1a0035',gl:'#00f5ff',br:'rgba(0,245,255,',sc:'#ffffff',si:'rgba(191,0,255,.9)',bf:'#1a0040',bb:'#bf00ff',pc:'#00f5ff'},
 acid:   {bg:'#001400',g2:'#002800',gl:'#39ff14',br:'rgba(57,255,20,', sc:'#ccff00',si:'rgba(57,255,20,.9)', bf:'#001400',bb:'#39ff14',pc:'#39ff14'},
 space:  {bg:'#000010',g2:'#000820',gl:'#4488ff',br:'rgba(68,136,255,',sc:'#aaddff',si:'rgba(68,136,255,.9)',bf:'#000830',bb:'#4488ff',pc:'#4488ff'},
 fire:   {bg:'#150500',g2:'#2a0a00',gl:'#ff6600',br:'rgba(255,102,0,', sc:'#ffaa00',si:'rgba(255,68,0,.9)', bf:'#1a0500',bb:'#ff6600',pc:'#ff6600'},
 ice:    {bg:'#001020',g2:'#002040',gl:'#88ddff',br:'rgba(136,221,255,',sc:'#ddeeff',si:'rgba(136,221,255,.9)',bf:'#001828',bb:'#88ddff',pc:'#88ddff'},
 glitch: {bg:'#150010',g2:'#200018',gl:'#ff00aa',br:'rgba(255,0,170,', sc:'#ff66cc',si:'rgba(0,245,255,.9)', bf:'#150010',bb:'#ff00aa',pc:'#ff00aa'},
 toxic:  {bg:'#0a1000',g2:'#182000',gl:'#88ff00',br:'rgba(136,255,0,', sc:'#ccff44',si:'rgba(255,102,0,.9)',bf:'#101800',bb:'#88ff00',pc:'#88ff00'},
 blood:  {bg:'#150000',g2:'#280000',gl:'#ff2200',br:'rgba(255,34,0,',  sc:'#ff8888',si:'rgba(255,136,0,.9)',bf:'#200000',bb:'#ff2200',pc:'#ff4400'},
 void:   {bg:'#05000f',g2:'#0a0020',gl:'#6600ff',br:'rgba(102,0,255,', sc:'#cc88ff',si:'rgba(255,0,170,.9)',bf:'#080015',bb:'#6600ff',pc:'#6600ff'},
 storm:  {bg:'#101000',g2:'#201800',gl:'#ffee00',br:'rgba(255,238,0,', sc:'#ffffff',si:'rgba(0,245,255,.9)', bf:'#181200',bb:'#ffee00',pc:'#ffee00'},
 tomb:   {bg:'#001510',g2:'#002820',gl:'#00ffaa',br:'rgba(0,255,170,', sc:'#aaffdd',si:'rgba(255,0,170,.9)',bf:'#001510',bb:'#00ffaa',pc:'#00ffaa'},
 warp:   {bg:'#100015',g2:'#200028',gl:'#ff44ff',br:'rgba(255,68,255,',sc:'#ffaaff',si:'rgba(0,245,255,.9)',bf:'#180020',bb:'#ff44ff',pc:'#ff44ff'},
 lava:   {bg:'#1a0500',g2:'#300800',gl:'#ff4400',br:'rgba(255,68,0,',  sc:'#ffcc44',si:'rgba(255,170,0,.9)',bf:'#220500',bb:'#ff6600',pc:'#ff4400'},
 dark:   {bg:'#080008',g2:'#100010',gl:'#aa00ff',br:'rgba(170,0,255,', sc:'#dd88ff',si:'rgba(255,0,170,.9)',bf:'#0a000a',bb:'#aa00ff',pc:'#aa00ff'},
 nstorm: {bg:'#000a15',g2:'#001025',gl:'#00f5ff',br:'rgba(0,245,255,', sc:'#ff9944',si:'rgba(255,102,0,.9)',bf:'#000a18',bb:'#00f5ff',pc:'#ff6600'},
 crystal:{bg:'#0a0a1a',g2:'#10103a',gl:'#88ffff',br:'rgba(136,255,255,',sc:'#ffddff',si:'rgba(255,136,255,.9)',bf:'#0a0a20',bb:'#88ffff',pc:'#88ffff'},
 omega:  {bg:'#150000',g2:'#200005',gl:'#ff0044',br:'rgba(255,0,68,',  sc:'#ffee44',si:'rgba(255,238,0,.9)',bf:'#180000',bb:'#ff0044',pc:'#ffee00'},
 mirror: {bg:'#0a0a0a',g2:'#141414',gl:'#ffffff',br:'rgba(255,255,255,',sc:'#ffffff',si:'rgba(200,200,200,.9)',bf:'#101010',bb:'#888888',pc:'#cccccc'},
 abyss:  {bg:'#000008',g2:'#00000f',gl:'#5533ff',br:'rgba(85,51,255,', sc:'#8866ff',si:'rgba(255,0,170,.9)',bf:'#00000a',bb:'#4422cc',pc:'#6644ff'},
 aurora: {bg:'#031225',g2:'#06253f',gl:'#4df3ff',br:'rgba(77,243,255,', sc:'#d8f9ff',si:'rgba(113,87,255,.9)',bf:'#092845',bb:'#6bf7ff',pc:'#8cfbff'},
 cyber:  {bg:'#120012',g2:'#1f0030',gl:'#ff2ec6',br:'rgba(255,46,198,',sc:'#ffc5ef',si:'rgba(0,245,255,.95)',bf:'#220033',bb:'#ff2ec6',pc:'#ff7de0'},
 desert: {bg:'#1c1200',g2:'#322100',gl:'#ffb347',br:'rgba(255,179,71,',sc:'#ffe4b5',si:'rgba(255,118,50,.92)',bf:'#2a1900',bb:'#ff9f43',pc:'#ffd27a'},
 jungle: {bg:'#04180c',g2:'#06331a',gl:'#66ff99',br:'rgba(102,255,153,',sc:'#d5ffe7',si:'rgba(0,200,120,.92)',bf:'#052312',bb:'#4dff8f',pc:'#88ffba'},
 glacier:{bg:'#001221',g2:'#00273f',gl:'#8cdcff',br:'rgba(140,220,255,',sc:'#eef9ff',si:'rgba(130,170,255,.95)',bf:'#001f34',bb:'#9be6ff',pc:'#bdefff'},
 eclipse:{bg:'#140014',g2:'#260026',gl:'#ff66ff',br:'rgba(255,102,255,',sc:'#ffd8ff',si:'rgba(255,219,88,.95)',bf:'#1f001f',bb:'#ff88ff',pc:'#ffc2ff'},
 ruins:  {bg:'#14110a',g2:'#252015',gl:'#d4bf7a',br:'rgba(212,191,122,',sc:'#f2ead1',si:'rgba(180,140,90,.92)',bf:'#1f1a0f',bb:'#c9ab6c',pc:'#e6cf9b'},
 volt:   {bg:'#041122',g2:'#072345',gl:'#35b6ff',br:'rgba(53,182,255,',sc:'#d6f1ff',si:'rgba(255,209,82,.94)',bf:'#082043',bb:'#4cc1ff',pc:'#7ed4ff'},
 final:  {bg:'#0f000f',g2:'#1a001a',gl:'#ff00aa',br:'rgba(255,0,170,', sc:'#ffee00',si:'rgba(255,238,0,.9)',bf:'#120012',bb:'#ff00aa',pc:'#ff00aa'},
};

const EXTRA_ENV_ROTATION=[
  'aurora','cyber','desert','jungle','glacier','eclipse','ruins','volt',
  'neon','acid','space','fire','ice','glitch','toxic','blood',
  'void','storm','tomb','warp','lava','dark','nstorm','crystal','omega','mirror','abyss','final'
];
const NAME_A=['PHOTON','RAZOR','TITAN','ASTRAL','NOVA','GHOST','PULSE','VECTOR','QUANTUM','SOLAR'];
const NAME_B=['GAUNTLET','CORRIDOR','ASCENT','FRACTURE','TRIAL','LABYRINTH','BREACH','TEMPLE','CASCADE','CIRCUIT'];

function difficultyByNumber(levelNum){
  if(levelNum<=30)return 'medium';
  if(levelNum<=65)return 'hard';
  return 'insane';
}
function accentByDifficulty(diff){
  if(diff==='medium')return '#ffee00';
  if(diff==='hard')return '#ff6600';
  return '#ff00aa';
}

for(let i=0;i<80;i++){
  const levelNum=21+i;
  const envKey=EXTRA_ENV_ROTATION[i%EXTRA_ENV_ROTATION.length];
  const diff=difficultyByNumber(levelNum);
  const env=ENV[envKey]||ENV.neon;
  const name=`${NAME_A[i%NAME_A.length]} ${NAME_B[Math.floor(i/NAME_A.length)%NAME_B.length]} ${String(levelNum).padStart(2,'0')}`;
  META.push({n:name,d:diff,e:envKey,c:env.gl,a:accentByDifficulty(diff)});
}

// ── BUILDERS ──────────────────────────────────────────────────
const LL=4400;
const LL_EXT_BASE=7600;
function levelLengthFor(n){
  if(n<20)return LL;
  const i=n-20;
  return LL_EXT_BASE+Math.floor(i/10)*260+(i%10)*140;
}
function sp(x,y=GR-S){return{t:'s',x,y,w:S,h:S};}
function si(x,y=0){return{t:'i',x,y,w:S,h:S};}
function bl(x,y,w=B,h=B){return{t:'b',x,y,w,h};}
function pa(x){return{t:'j',x,y:GR-20,w:50,h:20};}
function or(x,y){return{t:'o',x,y,r:18};}
function pt(x){return{t:'p',x,y:GR-220,w:55,h:220};}
function wl(x,h){const o=[];for(let i=0;i<h;i++)o.push(bl(x,GR-B*(i+1)));return o;}
function sr(x,n,g=0){const o=[];for(let i=0;i<n;i++)o.push(sp(x+i*(S+g)));return o;}
function ir(x,n,g=0){const o=[];for(let i=0;i<n;i++)o.push(si(x+i*(S+g)));return o;}

// Each level: ~3 min = 180s×60fps×7px = 75600px ; but at 7px/frame constant
// LL=4400px → 4400/7 = 628 frames = ~10.5s pure travel
// A skilled player needs many attempts; designing for ~3min means generous obstacle density
// that requires ~20-40 retries average. Each attempt ~10s → 20 attempts ≈ 3min 20s ✓

function buildLv(n){
  switch(n){
    case 0:return lv1();case 1:return lv2();case 2:return lv3();case 3:return lv4();
    case 4:return lv5();case 5:return lv6();case 6:return lv7();case 7:return lv8();
    case 8:return lv9();case 9:return lv10();case 10:return lv11();case 11:return lv12();
    case 12:return lv13();case 13:return lv14();case 14:return lv15();case 15:return lv16();
    case 16:return lv17();case 17:return lv18();case 18:return lv19();case 19:return lv20();
    default:return buildGeneratedLv(n);
  }
}

// ── LV1 STARFALL easy neon — intro to jumping ─────────────────
function lv1(){
  return[
    sp(520),sp(800),sp(1080),
    ...sr(1180,2),sp(1460),sp(1680),
    ...wl(1900,1),sp(2060),
    ...sr(2280,2),sp(2560),
    ...wl(2760,2),sp(2920),
    pa(3120),...sr(3440,2),sp(3700),sp(3900),
    ...sr(4100,2),pt(4300),
  ];
}

// ── LV2 ACID RAIN easy — even rhythm ──────────────────────────
function lv2(){
  const o=[];
  for(let x=420;x<2200;x+=250)o.push(sp(x));
  o.push(...sr(2300,2),sp(2560),...sr(2740,2));
  o.push(...wl(2960,1),sp(3120),...sr(3320,2));
  o.push(pa(3560),...sr(3880,2),sp(4060));
  o.push(...sr(4160,2),pt(4300));
  return o;
}

// ── LV3 DEEP SPACE easy — block steps ─────────────────────────
function lv3(){
  const o=[sp(480),sp(700)];
  // rising staircase: 1T,1T,2T,1T,1T,2T
  [1,1,2,1,1,2,1,2].forEach((h,i)=>{
    const bx=900+i*170;
    o.push(...wl(bx,h));
    o.push(sp(bx+B+70+(h>1?10:0)));
  });

function mkRand(seed){
  let t=seed>>>0;
  return ()=>{
    t+=0x6D2B79F5;
    let r=Math.imul(t^(t>>>15),1|t);
    r^=r+Math.imul(r^(r>>>7),61|r);
    return ((r^(r>>>14))>>>0)/4294967296;
  };
}
function ri(rand,min,max){return Math.floor(rand()*(max-min+1))+min;}

function buildGeneratedLv(n){
  const idx=n-20;
  const len=levelLengthFor(n);
  const rand=mkRand(90210+idx*131);
  const diff=META[n]?.d||'hard';
  const diffBoost=diff==='medium'?0:(diff==='hard'?1:2);
  const o=[];
  let x=360;
  let seg=0;
  const endX=len-1180;

  while(x<endX){
    const pattern=(idx+seg*3+ri(rand,0,6))%8;
    const span=440+diffBoost*58+ri(rand,0,120);

    if(pattern===0){
      const count=4+diffBoost+ri(rand,0,2);
      const spacing=Math.max(112,170-diffBoost*14-ri(rand,0,20));
      for(let i=0;i<count;i++){
        o.push(sp(x+i*spacing));
        if(diffBoost>0&&i%3===1&&rand()>.42)o.push(sp(x+i*spacing+40));
      }
    } else if(pattern===1){
      const pairs=4+diffBoost+ri(rand,0,2);
      const spacing=Math.max(120,178-diffBoost*10-ri(rand,0,16));
      for(let i=0;i<pairs;i++){
        const px=x+i*spacing;
        o.push(si(px));
        o.push(sp(px+60));
      }
    } else if(pattern===2){
      const gates=3+diffBoost+ri(rand,0,1);
      const spacing=230-diffBoost*16;
      for(let i=0;i<gates;i++){
        const gx=x+i*spacing;
        const h=Math.min(3,1+((i+idx)%3===0?1:0)+(diffBoost>1&&i%4===0?1:0));
        o.push(...wl(gx,h));
        o.push(sp(gx-42));
        o.push(sp(gx+B+35+ri(rand,0,28)));
      }
    } else if(pattern===3){
      const bed=4+diffBoost*2+ri(rand,0,2);
      o.push(pa(x+35));
      if(rand()>.2)o.push(or(x+170,GR-(220+ri(rand,0,40))));
      o.push(...sr(x+250,bed,3));
      if(diffBoost>0&&rand()>.4)o.push(si(x+300+ri(rand,0,55)));
    } else if(pattern===4){
      const steps=5+diffBoost;
      for(let i=0;i<steps;i++){
        const bx=x+i*185;
        const h=Math.min(3,1+((i+idx)%4===0?1:0)+(diffBoost>1&&i%5===2?1:0));
        o.push(...wl(bx,h));
        o.push(sp(bx+B+(i%2===0?55:35)));
        if(diffBoost>0&&h>1&&rand()>.58)o.push(sp(bx-40));
      }
    } else if(pattern===5){
      const units=5+diffBoost+ri(rand,0,2);
      const spacing=Math.max(118,145-ri(rand,0,12));
      for(let i=0;i<units;i++){
        const ux=x+i*spacing;
        if(i%2===0){o.push(si(ux));o.push(sp(ux+55));}
        else{o.push(sp(ux));if(diffBoost>0&&rand()>.35)o.push(si(ux+40));}
      }
    } else if(pattern===6){
      const clusters=3+diffBoost;
      for(let i=0;i<clusters;i++){
        const cx=x+i*245;
        o.push(...sr(cx,1+ri(rand,0,2),3));
        o.push(...wl(cx+140,1+((i+idx)%2)));
        if(diffBoost>0&&rand()>.45)o.push(si(cx+102));
        if(diffBoost>1&&rand()>.55)o.push(sp(cx+184));
      }
    } else {
      const loops=6+diffBoost;
      for(let i=0;i<loops;i++){
        const sx=x+i*160;
        o.push(sp(sx));
        if(i%3===0)o.push(sp(sx+40));
        if(diffBoost>0&&i%2===0)o.push(si(sx+92));
      }
    }

    x+=span;
    seg++;
  }

  const tailX=len-980;
  o.push(pa(tailX));
  o.push(or(tailX+130,GR-(220+ri(rand,0,35))));
  o.push(...sr(tailX+230,2+diffBoost,3));
  o.push(...sr(len-420,2+Math.min(2,diffBoost),3));
  o.push(pt(len-100));

  return o;
}

function fmtT(f){const s=Math.floor(f/60),ms=Math.floor((f%60)*100/60);return`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}.${String(ms).padStart(2,'0')}`;}

// ── INPUT ─────────────────────────────────────────────────────
function onIn(){
  if(state==='start'){startG();return;}
  if(state==='dead'){restartGame();return;}
  if(state==='playing'){
    jumpQ=true;
    jumpBuffer=JUMP_BUFFER_FRAMES;
  }
}
document.addEventListener('keydown',e=>{if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();onIn();}});
function bindJumpTap(el){
  if(!el)return;
  const onPress=(e)=>{
    if(e.target&&typeof e.target.closest==='function'&&e.target.closest('button'))return;
    if(typeof e.button==='number'&&e.button!==0)return;
    e.preventDefault();
    onIn();
  };
  if('PointerEvent' in window){
    el.addEventListener('pointerdown',onPress,{passive:false});
    return;
  }
  el.addEventListener('touchstart',onPress,{passive:false});
  el.addEventListener('mousedown',onPress);
}
bindJumpTap(document.getElementById('gw'));

function startG(){
  state='playing';
  document.getElementById('ss').style.display='none';
  gTime=0;score=0;camX=0;resetP();parts=[];
  jumpQ=false;

function restartGame(){
  attempt++;
  assistScale=Math.max(ASSIST_MIN,1-Math.max(0,attempt-ASSIST_AFTER_ATTEMPTS)*0.04);
  document.getElementById('at').textContent=attempt;
  document.getElementById('ds').style.display='none';
  startG();
}

}

// ── PHYSICS ───────────────────────────────────────────────────
function rO(ax,ay,aw,ah,bx,by,bw,bh){return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;}

function spawnP(x,y,col,cnt=12,spd=4){
  for(let i=0;i<cnt;i++)parts.push({x,y,vx:(Math.random()-.5)*spd,vy:(Math.random()-.5)*spd-2,life:1,dec:.03+Math.random()*.04,sz:2+Math.random()*4,col});
}

function die(){
  state='dead';
  spawnP(player.x+player.w/2,player.y+player.h/2,env.pc,22,8);
  spawnP(player.x+player.w/2,player.y+player.h/2,'#ff00aa',12,6);
  const pr=Math.min(100,Math.round((player.x/levelLength)*100));
  score=Math.floor(camX/50);if(score>best)best=score;
  document.getElementById('dp').textContent=pr+'%';
  document.getElementById('dsc').textContent=score;
  document.getElementById('dbt').textContent=best;
  document.getElementById('ds').style.display='flex';
}

function winLv(){
  state='win';
  spawnP(player.x+player.w/2,player.y+player.h/2,'#ffee00',38,10);
  spawnP(player.x+player.w/2,player.y+player.h/2,env.pc,25,8);
  done[curLv]=true;
  if(!bTimes[curLv]||gTime<bTimes[curLv])bTimes[curLv]=gTime;
  score=Math.floor(camX/50);
  document.getElementById('wt').textContent=fmtT(gTime);
  document.getElementById('wsc').textContent=score;
  document.getElementById('wat').textContent=attempt;
  document.getElementById('ws').style.display='flex';
}

function update(){
  if(state!=='playing')return;
  gTime++;
  player.trail.push({x:player.x,y:player.y,rot:player.rotation});
  if(player.trail.length>8)player.trail.shift();

  if(jumpBuffer>0)jumpBuffer--;
  if(coyoteFrames>0)coyoteFrames--;
  if(jumpQ){
    jumpBuffer=Math.max(jumpBuffer,JUMP_BUFFER_FRAMES);
    jumpQ=false;
  }

  const tryBufferedJump=()=>{
    if(jumpBuffer<=0)return;
    if(player.onGround||coyoteFrames>0){
      player.vy=JF;
      player.onGround=false;
      coyoteFrames=0;
      jumpBuffer=0;
      spawnP(player.x+player.w/2,player.y+player.h,env.pc,5,3);
      return;
    }
    if(airJumpsUsed>=AIR_JUMPS_MAX)return;
    player.vy=Math.min(player.vy,AIR_JUMP_FORCE);
    player.onGround=false;
    coyoteFrames=0;
    jumpBuffer=0;
    airJumpsUsed++;
    spawnP(player.x+player.w/2,player.y+player.h,'#ffee00',8,3.6);
  };

  tryBufferedJump();

  player.vy=Math.min(player.vy+GV,TERMINAL_VY);
  player.y+=player.vy;
  player.x+=MS*assistScale;
  if(!player.onGround)player.rotation+=5;
  else player.rotation=Math.round(player.rotation/90)*90;

  camX=Math.max(0,player.x-W*.3);

  player.onGround=false;
  if(player.y+player.h>=GR){
    player.y=GR-player.h;
    player.vy=0;
    player.onGround=true;
    coyoteFrames=COYOTE_FRAMES;
    airJumpsUsed=0;
  }
  if(player.y<0){player.y=0;player.vy=Math.abs(player.vy)*.4;}
  if(player.y>H+120)die();

  score=Math.floor(camX/50);if(score>best)best=score;
  document.getElementById('sc').textContent=score;
  document.getElementById('bt').textContent=best;
  document.getElementById('pb').style.width=Math.min(100,(player.x/levelLength)*100)+'%';
  const s=Math.floor(gTime/60);
  document.getElementById('lt').textContent=Math.floor(s/60)+':'+String(s%60).padStart(2,'0');

  const px=player.x,py=player.y,pw=player.w,ph=player.h;
  for(const obj of lvObjs){
    const ox=obj.x,oy=obj.y,ow=obj.w||S,oh=obj.h||S;
    if(ox-camX>W+120||ox+ow<camX-40)continue;
    if(obj.t==='s'){
      if(rO(px+8,py+8,pw-16,ph-10,ox+8,oy+12,ow-16,oh-14))die();
    } else if(obj.t==='i'){
      if(rO(px+8,py+5,pw-16,ph-10,ox+8,oy,ow-16,oh-14))die();
    } else if(obj.t==='b'||obj.t==='pl'){
      if(rO(px,py,pw,ph,ox,oy,ow,oh)){
        const oL=(px+pw)-ox,oR=(ox+ow)-px,oT=(py+ph)-oy,oB=(oy+oh)-py;
        if(Math.min(oT,oB)<Math.min(oL,oR)){
          if(oT<oB){player.y=oy-ph;player.vy=0;player.onGround=true;
            coyoteFrames=COYOTE_FRAMES;
            airJumpsUsed=0;
          }
          else{player.y=oy+oh;player.vy=Math.abs(player.vy)*.3;}
        } else die();
      }
    } else if(obj.t==='j'){
      if(rO(px,py+ph-5,pw,5,ox,oy,ow,oh)){player.vy=JPF;player.onGround=false;
        coyoteFrames=0;
        jumpBuffer=0;
        airJumpsUsed=0;
        spawnP(player.x+pw/2,player.y+ph,'#ffee00',10,4);}
    } else if(obj.t==='o'){
      const d=Math.sqrt((px+pw/2-ox)**2+(py+ph/2-oy)**2);
      if(d<obj.r+17&&jumpBuffer>0){player.vy=JF*1.1;player.onGround=false;
        coyoteFrames=0;
        jumpBuffer=0;
        airJumpsUsed=0;
        spawnP(ox,oy,'#ffee00',12,5);}
    } else if(obj.t==='p'){
      if(rO(px,py,pw,ph,ox,oy,ow,oh))winLv();
    }
  }

  tryBufferedJump();

  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.1;p.life-=p.dec;
    if(p.life<=0)parts.splice(i,1);
  }
}

// ── DRAWING ───────────────────────────────────────────────────
function drawBg(){
  ctx.fillStyle=env.bg;ctx.fillRect(0,0,W,H);
  for(const r of bgR){
    const sx=r.x-camX*r.spd;
    if(sx+r.w<-50||sx>W+50)continue;
    ctx.strokeStyle=env.br+r.a+')';ctx.lineWidth=1;ctx.strokeRect(sx,r.y,r.w,r.h);
  }
  ctx.fillStyle=env.g2;ctx.fillRect(0,GR,W,H-GR);
  ctx.shadowColor=env.gl;ctx.shadowBlur=12;
  ctx.strokeStyle=env.gl;ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,GR);ctx.lineTo(W,GR);ctx.stroke();
  ctx.shadowBlur=0;
  ctx.strokeStyle=env.br+'0.06)';ctx.lineWidth=1;
  for(let gx=-(camX%T);gx<W;gx+=T){ctx.beginPath();ctx.moveTo(gx,GR);ctx.lineTo(gx,H);ctx.stroke();}
}

function drawSp(obj){
  const sx=obj.x-camX;
  ctx.save();ctx.shadowColor=env.gl;ctx.shadowBlur=7;ctx.fillStyle=env.sc;
  ctx.beginPath();ctx.moveTo(sx,obj.y+obj.h);ctx.lineTo(sx+obj.w/2,obj.y);ctx.lineTo(sx+obj.w,obj.y+obj.h);
  ctx.closePath();ctx.fill();ctx.restore();
}
function drawSpI(obj){
  const sx=obj.x-camX;
  ctx.save();ctx.shadowColor=env.gl;ctx.shadowBlur=7;ctx.fillStyle=env.si;
  ctx.beginPath();ctx.moveTo(sx,obj.y);ctx.lineTo(sx+obj.w/2,obj.y+obj.h);ctx.lineTo(sx+obj.w,obj.y);
  ctx.closePath();ctx.fill();ctx.restore();
}
function drawBl(obj){
  const sx=obj.x-camX;
  ctx.save();ctx.fillStyle=env.bf;ctx.fillRect(sx,obj.y,obj.w,obj.h);
  ctx.strokeStyle=env.bb+'44';ctx.lineWidth=1;
  for(let gx=0;gx<=obj.w;gx+=T){ctx.beginPath();ctx.moveTo(sx+gx,obj.y);ctx.lineTo(sx+gx,obj.y+obj.h);ctx.stroke();}
  for(let gy=0;gy<=obj.h;gy+=T){ctx.beginPath();ctx.moveTo(sx,obj.y+gy);ctx.lineTo(sx+obj.w,obj.y+gy);ctx.stroke();}
  ctx.shadowColor=env.bb;ctx.shadowBlur=9;ctx.strokeStyle=env.bb;ctx.lineWidth=2;
  ctx.strokeRect(sx,obj.y,obj.w,obj.h);ctx.restore();
}
function drawJP(obj){
  const sx=obj.x-camX,pulse=.7+.3*Math.sin(gTime*.12);
  ctx.save();ctx.shadowColor='#ffee00';ctx.shadowBlur=14*pulse;
  ctx.fillStyle=`rgba(255,238,0,${pulse})`;ctx.fillRect(sx,obj.y,obj.w,obj.h);
  ctx.fillStyle='#000';ctx.beginPath();
  ctx.moveTo(sx+obj.w/2,obj.y+4);ctx.lineTo(sx+obj.w/2+8,obj.y+obj.h-3);ctx.lineTo(sx+obj.w/2-8,obj.y+obj.h-3);
  ctx.closePath();ctx.fill();ctx.restore();
}
function drawOrb(obj){
  const sx=obj.x-camX,pulse=.8+.2*Math.sin(gTime*.08);
  ctx.save();ctx.shadowColor='#ffee00';ctx.shadowBlur=20*pulse;
  ctx.strokeStyle='#ffee00';ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(sx,obj.y,obj.r*1.6,0,Math.PI*2);ctx.stroke();
  const g=ctx.createRadialGradient(sx,obj.y,0,sx,obj.y,obj.r);
  g.addColorStop(0,'#fff');g.addColorStop(.5,'#ffee00');g.addColorStop(1,'rgba(255,238,0,.1)');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(sx,obj.y,obj.r,0,Math.PI*2);ctx.fill();ctx.restore();
}
function drawPortal(obj){
  const sx=obj.x-camX,t=gTime*.05;
  ctx.save();ctx.shadowColor=env.gl;ctx.shadowBlur=22;
  ctx.strokeStyle=env.gl;ctx.lineWidth=3;ctx.strokeRect(sx,obj.y,obj.w,obj.h);
  const g=ctx.createLinearGradient(sx,obj.y,sx+obj.w,obj.y+obj.h);
  g.addColorStop(0,`rgba(0,245,255,${.07+.06*Math.sin(t)})`);
  g.addColorStop(.5,`rgba(191,0,255,${.13+.07*Math.cos(t)})`);
  g.addColorStop(1,`rgba(0,245,255,${.07+.06*Math.sin(t+1)})`);
  ctx.fillStyle=g;ctx.fillRect(sx,obj.y,obj.w,obj.h);
  ctx.fillStyle='#fff';ctx.font='700 9px Orbitron';ctx.textAlign='center';
  ctx.fillText('FINISH',sx+obj.w/2,obj.y+obj.h/2+4);ctx.restore();
}
function drawPlayer(){
  if(state==='dead'||state==='ls')return;
  for(let i=0;i<player.trail.length;i++){
    const t=player.trail[i],a=(i/player.trail.length)*.32,s=player.w*(.5+.5*(i/player.trail.length))*.5;
    const sx=t.x-camX+player.w/2,sy=t.y+player.h/2;
    ctx.save();ctx.globalAlpha=a;ctx.translate(sx,sy);ctx.rotate(t.rot*Math.PI/180);
    ctx.fillStyle=env.pc;ctx.fillRect(-s,-s,s*2,s*2);ctx.restore();
  }
  const cx=player.x-camX+player.w/2,cy=player.y+player.h/2;
  ctx.save();ctx.translate(cx,cy);ctx.rotate(player.rotation*Math.PI/180);
  ctx.shadowColor=env.pc;ctx.shadowBlur=17;ctx.fillStyle=env.pc;
  ctx.fillRect(-player.w/2,-player.h/2,player.w,player.h);
  ctx.shadowBlur=0;ctx.strokeStyle='#fff';ctx.lineWidth=2;
  ctx.strokeRect(-player.w/2,-player.h/2,player.w,player.h);
  ctx.fillStyle='rgba(0,0,0,.7)';
  ctx.fillRect(-11,-8,7,7);ctx.fillRect(4,-8,7,7);ctx.fillRect(-8,5,16,4);
  ctx.restore();
}
function drawP2(){
  pCtx.clearRect(0,0,W,H);
  for(const p of parts){
    pCtx.save();pCtx.globalAlpha=p.life;pCtx.shadowColor=p.col;pCtx.shadowBlur=8;
    pCtx.fillStyle=p.col;pCtx.fillRect(p.x-camX-p.sz/2,p.y-p.sz/2,p.sz,p.sz);pCtx.restore();
  }
}
function drawObjs(){
  for(const obj of lvObjs){
    const sx=obj.x-camX;
    if(sx+(obj.w||S)<-100||sx>W+100)continue;
    if(obj.t==='s')drawSp(obj);
    else if(obj.t==='i')drawSpI(obj);
    else if(obj.t==='b'||obj.t==='pl')drawBl(obj);
    else if(obj.t==='j')drawJP(obj);
    else if(obj.t==='o')drawOrb(obj);
    else if(obj.t==='p')drawPortal(obj);
  }
}
function drawVig(){
  const g=ctx.createRadialGradient(W/2,H/2,H*.3,W/2,H/2,H*.9);
  g.addColorStop(0,'transparent');g.addColorStop(1,'rgba(0,0,5,.42)');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
}

function loop(){
  update();
  if(state==='playing'||state==='dead'||state==='start'||state==='win'){drawBg();drawObjs();drawPlayer();drawVig();drawP2();}
  requestAnimationFrame(loop);
}

function getUpcomingObstacles(limit=8){
  const list=(lvObjs||[])
    .filter(obj=>obj.x>=player.x-24&&obj.x<=player.x+320)
    .sort((a,b)=>a.x-b.x)
    .slice(0,limit)
    .map((obj)=>({
      type:obj.t,
      dx:Math.round(obj.x-player.x),
      y:Math.round(obj.y||0),
      w:Math.round(obj.w||S),
      h:Math.round(obj.h||S),
    }));
  return list;
}

function buildTextState(){
  return {
    mode:'arcade',
    variant:'neon-rush',
    coordinates:'x advances to the right; y increases downward.',
    phase:state,
    level:{
      index:curLv,
      number:curLv+1,
      name:META[curLv]?.n||'UNKNOWN',
      difficulty:META[curLv]?.d||'easy',
      length:levelLength,
    },
    player:{
      x:Math.round(player.x),
      y:Math.round(player.y),
      vy:Number(player.vy.toFixed(2)),
      onGround:Boolean(player.onGround),
      jumpBuffer,
      coyoteFrames,
      airJumpsUsed,
      airJumpsLeft:Math.max(0,AIR_JUMPS_MAX-airJumpsUsed),
    },
    score,
    best,
    attempt,
    assistScale:Number(assistScale.toFixed(2)),
    progressPct:Math.min(100,Math.max(0,Math.round((player.x/levelLength)*100))),
    timerFrames:gTime,
    upcoming:getUpcomingObstacles(),
  };
}

window.render_game_to_text=()=>JSON.stringify(buildTextState());
window.advanceTime=(ms=0)=>{
  const n=Math.max(1,Math.round((Number(ms)||0)/16.6667));
  for(let i=0;i<n;i++){
    update();
    if(state==='playing'||state==='dead'||state==='start'||state==='win'){
      drawBg();drawObjs();drawPlayer();drawVig();drawP2();
    }
  }
};

buildLS();
loop();
</script>
