# Redis tuning for the Plataforma Juegos SaaS node.
# 1.5 GB cap shared across all game backends. Pure cache, no source-of-truth
# data here — Postgres remains authoritative.
#
# Place at: /etc/redis/redis.conf (or merge with your distribution defaults).
# Restart: sudo systemctl restart redis-server

bind 127.0.0.1 ::1
port 6379
protected-mode yes
unixsocket /var/run/redis/redis.sock
unixsocketperm 770

# ── memory limits ───────────────────────────────────────────────────────────
maxmemory 1500mb
maxmemory-policy allkeys-lru        # cold keys evicted under pressure
maxmemory-samples 8

# Eviction and key expiry helpers for a cache-heavy workload with many short
# TTLs (packStatus 5s, rateLimit 60s, idempotency 1h). Higher hz keeps the
# expire scan aggressive; lazy* offloads big-key deletes off the main thread
# so a sudden eviction storm cannot stall foreground reads.
hz 100
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes

# ── persistence: cache-only, no AOF, minimal RDB ────────────────────────────
appendonly no
save ""                             # disable RDB snapshots; cache is rebuildable
stop-writes-on-bgsave-error no

# ── connection / IO ─────────────────────────────────────────────────────────
timeout 0
tcp-keepalive 60
tcp-backlog 511

# Allow ioredis pipelining to flush large batches
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit pubsub 32mb 8mb 60

# ── concurrency ─────────────────────────────────────────────────────────────
io-threads 2                        # match light vCPU budget
io-threads-do-reads no

# ── lua / scripting ─────────────────────────────────────────────────────────
lua-time-limit 5000

# ── slow log / latency ──────────────────────────────────────────────────────
slowlog-log-slower-than 10000
slowlog-max-len 128
latency-monitor-threshold 100

# ── log noise ───────────────────────────────────────────────────────────────
loglevel notice
logfile /var/log/redis/redis-server.log
