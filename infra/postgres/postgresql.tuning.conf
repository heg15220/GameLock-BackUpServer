# Postgres tuning for the Plataforma Juegos SaaS node.
# 16 GB RAM / 4 vCPU / SSD. Shared instance for all game DBs.
#
# Place at: /etc/postgresql/16/main/conf.d/plataforma-juegos.conf
# (Ubuntu/Debian default include path; create the directory if needed.)
# Restart: sudo systemctl restart postgresql

# ── memory ──────────────────────────────────────────────────────────────────
shared_buffers = 3GB                # ~25% of RAM total on the box
effective_cache_size = 8GB          # hint, overlaps with OS file cache
work_mem = 8MB                      # per-sort/hash op; cap pico ~640 MB
maintenance_work_mem = 256MB        # for VACUUM, CREATE INDEX, etc.

# ── connections ─────────────────────────────────────────────────────────────
max_connections = 80                # ~16 from gacha + ~30 other games + admin
superuser_reserved_connections = 3

# ── WAL ─────────────────────────────────────────────────────────────────────
wal_level = replica
max_wal_size = 4GB
min_wal_size = 1GB
wal_buffers = 16MB
checkpoint_completion_target = 0.9
checkpoint_timeout = 15min

# ── planner (SSD assumptions) ───────────────────────────────────────────────
random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 100

# ── parallelism ─────────────────────────────────────────────────────────────
max_worker_processes = 4
max_parallel_workers_per_gather = 2
max_parallel_workers = 4

# ── autovacuum (more aggressive than defaults for hot game tables) ──────────
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 30s
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05
autovacuum_vacuum_cost_delay = 2ms

# ── logging (light, useful for tuning) ──────────────────────────────────────
log_min_duration_statement = 500ms
log_lock_waits = on
log_temp_files = 1MB
log_checkpoints = on
log_autovacuum_min_duration = 5s
