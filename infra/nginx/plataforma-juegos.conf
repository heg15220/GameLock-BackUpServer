# Reverse proxy config for the Plataforma Juegos SaaS node.
# Single VM with shared Postgres + Redis serving multiple game backends.
#
# Place at: /etc/nginx/sites-available/plataforma-juegos.conf
# Enable with: ln -s ../sites-available/plataforma-juegos.conf /etc/nginx/sites-enabled/
# Reload: sudo nginx -t && sudo systemctl reload nginx

# ── connection pool to Node workers ──────────────────────────────────────────
upstream wikipedia_gacha {
    server 127.0.0.1:8791;
    keepalive 64;
}

upstream penalty_shootout {
    # adjust port to whatever server/penalty-shootout/index.mjs binds
    server 127.0.0.1:8792;
    keepalive 32;
}

upstream cosmic_vanguard {
    server 127.0.0.1:8793;
    keepalive 32;
}

# ── per-IP request rate limit (in addition to the per-token limit in Redis) ──
limit_req_zone $binary_remote_addr zone=api_per_ip:10m rate=300r/m;
# Stricter limit on pack opens — gameplay is naturally paced.
limit_req_zone $binary_remote_addr zone=open_pack_per_ip:10m rate=120r/m;

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name plataforma-juegos.example;   # ← change to your domain

    ssl_certificate     /etc/letsencrypt/live/plataforma-juegos.example/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/plataforma-juegos.example/privkey.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Security headers — minimal sane defaults
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    # SPA estatica (Vite build output)
    root /var/www/plataforma-juegos/dist;
    index index.html;

    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # Brotli is even better when nginx-mod-brotli is installed
    # brotli on;
    # brotli_types text/plain text/css application/javascript application/json image/svg+xml;
    # brotli_min_length 1024;

    # Cache static assets aggressively
    location ~* \.(js|css|woff2?|svg|png|jpg|webp|avif|ico)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }

    # ── Wikipedia Gacha API ─────────────────────────────────────────────────
    location = /api/wikipedia-gacha/packs/open {
        limit_req zone=open_pack_per_ip burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://wikipedia_gacha;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_header Idempotency-Key;

        proxy_connect_timeout 1s;
        proxy_read_timeout 6s;
        proxy_send_timeout 6s;
    }

    location /api/wikipedia-gacha/ {
        limit_req zone=api_per_ip burst=50 nodelay;
        limit_req_status 429;

        proxy_pass http://wikipedia_gacha;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 1s;
        proxy_read_timeout 6s;
        proxy_send_timeout 6s;
    }

    # ── Other game backends ─────────────────────────────────────────────────
    location /api/penalty-shootout/ {
        limit_req zone=api_per_ip burst=50 nodelay;
        proxy_pass http://penalty_shootout;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 6s;
    }

    location /api/cosmic-vanguard/ {
        limit_req zone=api_per_ip burst=50 nodelay;
        proxy_pass http://cosmic_vanguard;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 6s;
    }

    # Health endpoint exposed unauthenticated
    location = /health {
        access_log off;
        proxy_pass http://wikipedia_gacha/health;
        proxy_connect_timeout 1s;
        proxy_read_timeout 2s;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
