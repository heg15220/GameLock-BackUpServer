user nginx;
worker_processes auto;
# Respaldar los 8192 worker_connections con suficientes descriptores de fichero.
# Sin esto, nginx se queda sin FDs mucho antes del limite de conexiones bajo carga.
worker_rlimit_nofile 65535;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 8192;
  multi_accept on;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;

  keepalive_timeout 30;
  keepalive_requests 1000;
  server_tokens off;

  # ── Anti slow-loris ────────────────────────────────────────────────────────
  # Cortar clientes que envian cabeceras/cuerpo gota a gota para ocupar workers.
  client_header_timeout 10s;
  client_body_timeout 10s;
  send_timeout 10s;
  reset_timedout_connection on;

  client_body_buffer_size 64k;
  client_header_buffer_size 16k;
  large_client_header_buffers 4 32k;
  # 1 MB basta para las APIs JSON; 20 MB por request era un vector de agotamiento
  # de RAM bajo flood. Se sube por location si algun backend lo necesitara.
  client_max_body_size 1m;

  gzip on;
  gzip_vary on;
  gzip_min_length 256;
  gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml;

  include /etc/nginx/conf.d/*.conf;
}
