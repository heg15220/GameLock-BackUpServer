<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" fill="none">
  <defs>
    <linearGradient id="dj-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bfe8ff"/>
      <stop offset="100%" stop-color="#eaf7ff"/>
    </linearGradient>
  </defs>

  <rect width="200" height="140" fill="#060a14"/>

  <!-- four stacked lanes -->
  <g>
    <!-- lane template repeated via groups -->
    <g>
      <rect x="0" y="4" width="200" height="30" fill="url(#dj-sky)"/>
      <rect x="0" y="20" width="200" height="4" fill="#7cbf4e"/>
      <rect x="0" y="24" width="200" height="10" fill="#d8c184"/>
    </g>
    <g transform="translate(0,34)">
      <rect x="0" y="0" width="200" height="30" fill="url(#dj-sky)"/>
      <rect x="0" y="16" width="200" height="4" fill="#7cbf4e"/>
      <rect x="0" y="20" width="200" height="10" fill="#d8c184"/>
    </g>
    <g transform="translate(0,68)">
      <rect x="0" y="0" width="200" height="30" fill="url(#dj-sky)"/>
      <rect x="0" y="16" width="200" height="4" fill="#7cbf4e"/>
      <rect x="0" y="20" width="200" height="10" fill="#d8c184"/>
    </g>
    <g transform="translate(0,102)">
      <rect x="0" y="0" width="200" height="34" fill="url(#dj-sky)"/>
      <rect x="0" y="16" width="200" height="4" fill="#7cbf4e"/>
      <rect x="0" y="20" width="200" height="14" fill="#d8c184"/>
    </g>
  </g>

  <!-- distance signs -->
  <g font-family="'Segoe UI', sans-serif" font-size="6" font-weight="700" fill="#3a2a17" text-anchor="middle">
    <g><rect x="40" y="14" width="16" height="9" rx="2" fill="#fef3c7"/><text x="48" y="20.5">10m</text></g>
    <g><rect x="120" y="14" width="16" height="9" rx="2" fill="#fef3c7"/><text x="128" y="20.5">20m</text></g>
  </g>

  <!-- faceless runners (one per lane, at different distances) -->
  <!-- lane 1 (player, cyan) -->
  <g stroke="#67e8f9" stroke-width="2.4" stroke-linecap="round" fill="#67e8f9">
    <line x1="60" y1="26" x2="63" y2="34"/><line x1="60" y1="26" x2="57" y2="34"/>
    <line x1="60" y1="26" x2="60" y2="18"/>
    <line x1="60" y1="19" x2="55" y2="23"/><line x1="60" y1="19" x2="65" y2="23"/>
    <circle cx="60" cy="15" r="3.2" stroke="none"/>
  </g>
  <rect x="8" y="7" width="20" height="9" rx="3" fill="rgba(7,17,31,0.72)"/>
  <text x="18" y="13.5" font-family="'Segoe UI', sans-serif" font-size="6" font-weight="700" fill="#67e8f9" text-anchor="middle">TÚ</text>

  <!-- lane 2 (orange) -->
  <g stroke="#f97316" stroke-width="2.4" stroke-linecap="round" fill="#f97316" transform="translate(28,34)">
    <line x1="60" y1="26" x2="63" y2="34"/><line x1="60" y1="26" x2="57" y2="34"/>
    <line x1="60" y1="26" x2="60" y2="18"/>
    <line x1="60" y1="19" x2="55" y2="23"/><line x1="60" y1="19" x2="65" y2="23"/>
    <circle cx="60" cy="15" r="3.2" stroke="none"/>
  </g>

  <!-- lane 3 (lime) -->
  <g stroke="#a3e635" stroke-width="2.4" stroke-linecap="round" fill="#a3e635" transform="translate(-6,68)">
    <line x1="60" y1="26" x2="63" y2="34"/><line x1="60" y1="26" x2="57" y2="34"/>
    <line x1="60" y1="26" x2="60" y2="18"/>
    <line x1="60" y1="19" x2="55" y2="23"/><line x1="60" y1="19" x2="65" y2="23"/>
    <circle cx="60" cy="15" r="3.2" stroke="none"/>
  </g>

  <!-- lane 4 (pink) -->
  <g stroke="#f472b6" stroke-width="2.4" stroke-linecap="round" fill="#f472b6" transform="translate(46,102)">
    <line x1="60" y1="26" x2="63" y2="34"/><line x1="60" y1="26" x2="57" y2="34"/>
    <line x1="60" y1="26" x2="60" y2="18"/>
    <line x1="60" y1="19" x2="55" y2="23"/><line x1="60" y1="19" x2="65" y2="23"/>
    <circle cx="60" cy="15" r="3.2" stroke="none"/>
  </g>

  <!-- target flag on last lane -->
  <g transform="translate(170,102)">
    <line x1="0" y1="8" x2="0" y2="30" stroke="#ef4444" stroke-width="2" stroke-dasharray="3 3"/>
    <path d="M0 9 L10 12 L0 15 Z" fill="#ef4444"/>
  </g>
</svg>
