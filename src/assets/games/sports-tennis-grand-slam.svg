<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" fill="none">
  <defs>
    <linearGradient id="tnSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050b14"/>
      <stop offset="55%" stop-color="#0d2c47"/>
      <stop offset="100%" stop-color="#17456a"/>
    </linearGradient>
    <radialGradient id="tnBall" cx="35%" cy="32%">
      <stop offset="0%" stop-color="#f4ff9a"/>
      <stop offset="100%" stop-color="#c8d838"/>
    </radialGradient>
    <radialGradient id="tnLight" cx="50%" cy="50%">
      <stop offset="0%" stop-color="rgba(255,248,220,0.5)"/>
      <stop offset="100%" stop-color="rgba(255,248,220,0)"/>
    </radialGradient>
  </defs>

  <!-- Night sky over the show court -->
  <rect width="200" height="140" fill="url(#tnSky)"/>

  <!-- Floodlights -->
  <ellipse cx="30" cy="14" rx="24" ry="12" fill="url(#tnLight)"/>
  <ellipse cx="170" cy="14" rx="24" ry="12" fill="url(#tnLight)"/>

  <!-- Stands -->
  <rect x="0" y="24" width="200" height="24" fill="#101c2c"/>
  <g fill="#2c3a50">
    <rect x="8" y="30" width="4" height="6" rx="1.5"/>
    <rect x="24" y="28" width="4" height="6" rx="1.5"/>
    <rect x="40" y="32" width="4" height="6" rx="1.5"/>
    <rect x="56" y="29" width="4" height="6" rx="1.5"/>
    <rect x="72" y="33" width="4" height="6" rx="1.5"/>
    <rect x="88" y="28" width="4" height="6" rx="1.5"/>
    <rect x="104" y="32" width="4" height="6" rx="1.5"/>
    <rect x="120" y="29" width="4" height="6" rx="1.5"/>
    <rect x="136" y="33" width="4" height="6" rx="1.5"/>
    <rect x="152" y="28" width="4" height="6" rx="1.5"/>
    <rect x="168" y="31" width="4" height="6" rx="1.5"/>
    <rect x="184" y="29" width="4" height="6" rx="1.5"/>
  </g>

  <!-- Courtside sponsor hoardings -->
  <rect x="10" y="45" width="58" height="11" rx="1" fill="#2f7de1"/>
  <rect x="71" y="45" width="58" height="11" rx="1" fill="#d4432f"/>
  <rect x="132" y="45" width="58" height="11" rx="1" fill="#1f9e63"/>
  <rect x="10" y="45" width="180" height="3" fill="rgba(255,255,255,0.15)"/>

  <!-- Surround and court, in perspective -->
  <rect x="0" y="56" width="200" height="84" fill="#17456a"/>
  <polygon points="24,56 176,56 200,140 0,140" fill="#1d5a86"/>
  <polygon points="58,58 142,58 190,138 10,138" fill="#2f6fb5"/>

  <!-- Court lines -->
  <polygon points="58,58 142,58 190,138 10,138" fill="none" stroke="#f2f6fb" stroke-width="1.4"/>
  <line x1="70" y1="80" x2="130" y2="80" stroke="#f2f6fb" stroke-width="1"/>
  <line x1="46" y1="118" x2="154" y2="118" stroke="#f2f6fb" stroke-width="1.1"/>
  <line x1="100" y1="80" x2="100" y2="118" stroke="#f2f6fb" stroke-width="1"/>
  <line x1="66" y1="66" x2="134" y2="66" stroke="rgba(242,246,251,0.85)" stroke-width="1"/>

  <!-- Net across the middle -->
  <polygon points="34,99 166,99 166,88 34,88" fill="rgba(230,238,246,0.16)"/>
  <g stroke="rgba(230,238,246,0.38)" stroke-width="0.6">
    <line x1="48" y1="88" x2="48" y2="99"/>
    <line x1="62" y1="88" x2="62" y2="99"/>
    <line x1="76" y1="88" x2="76" y2="99"/>
    <line x1="90" y1="88" x2="90" y2="99"/>
    <line x1="104" y1="88" x2="104" y2="99"/>
    <line x1="118" y1="88" x2="118" y2="99"/>
    <line x1="132" y1="88" x2="132" y2="99"/>
    <line x1="146" y1="88" x2="146" y2="99"/>
  </g>
  <line x1="34" y1="88" x2="166" y2="88" stroke="#f2f6fb" stroke-width="2"/>
  <line x1="34" y1="86" x2="34" y2="100" stroke="#c9d4e0" stroke-width="2"/>
  <line x1="166" y1="86" x2="166" y2="100" stroke="#c9d4e0" stroke-width="2"/>

  <!-- Opponent at the far baseline -->
  <circle cx="112" cy="60" r="3.4" fill="#e8c39a"/>
  <line x1="112" y1="63" x2="112" y2="72" stroke="#e0724f" stroke-width="3" stroke-linecap="round"/>
  <line x1="112" y1="72" x2="108" y2="79" stroke="#2a3446" stroke-width="2" stroke-linecap="round"/>
  <line x1="112" y1="72" x2="116" y2="79" stroke="#2a3446" stroke-width="2" stroke-linecap="round"/>
  <line x1="112" y1="65" x2="120" y2="68" stroke="#e0724f" stroke-width="2" stroke-linecap="round"/>
  <ellipse cx="123" cy="69" rx="3.5" ry="4.5" fill="none" stroke="#f0e6d2" stroke-width="1.4"/>

  <!-- Ball, mid-rally -->
  <path d="M120 70 Q 100 84 84 104" stroke="rgba(226,240,120,0.3)" stroke-width="1.2" fill="none" stroke-dasharray="2 3"/>
  <circle cx="84" cy="104" r="5" fill="url(#tnBall)"/>
  <path d="M80 101 A 6 6 0 0 1 88 107" stroke="rgba(255,255,255,0.85)" stroke-width="1" fill="none"/>

  <!-- The player, near court, mid-forehand -->
  <circle cx="64" cy="98" r="5" fill="#e8c39a"/>
  <line x1="64" y1="103" x2="64" y2="118" stroke="#4aa3e0" stroke-width="5" stroke-linecap="round"/>
  <line x1="64" y1="118" x2="56" y2="132" stroke="#2a3446" stroke-width="3.4" stroke-linecap="round"/>
  <line x1="64" y1="118" x2="72" y2="132" stroke="#2a3446" stroke-width="3.4" stroke-linecap="round"/>
  <line x1="64" y1="106" x2="80" y2="100" stroke="#4aa3e0" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="86" cy="97" rx="6" ry="8" fill="none" stroke="#f0e6d2" stroke-width="2" transform="rotate(20 86 97)"/>
</svg>
