<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#07091c"/>
      <stop offset="100%" stop-color="#040612"/>
    </linearGradient>
    <radialGradient id="bmpG" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff80ff" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#cc00ff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#44006a" stop-opacity="0.4"/>
    </radialGradient>
    <radialGradient id="ballG" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#c8d8ee"/>
      <stop offset="100%" stop-color="#3a5070"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background felt -->
  <rect width="200" height="200" fill="url(#bg)" rx="12"/>
  <!-- Dot grid -->
  <g fill="#0d1228" opacity="0.8">
    <circle cx="40" cy="50" r="1.5"/><circle cx="60" cy="50" r="1.5"/><circle cx="80" cy="50" r="1.5"/>
    <circle cx="100" cy="50" r="1.5"/><circle cx="120" cy="50" r="1.5"/><circle cx="140" cy="50" r="1.5"/>
    <circle cx="40" cy="70" r="1.5"/><circle cx="60" cy="70" r="1.5"/><circle cx="80" cy="70" r="1.5"/>
    <circle cx="100" cy="70" r="1.5"/><circle cx="120" cy="70" r="1.5"/><circle cx="140" cy="70" r="1.5"/>
    <circle cx="40" cy="90" r="1.5"/><circle cx="60" cy="90" r="1.5"/><circle cx="80" cy="90" r="1.5"/>
    <circle cx="100" cy="90" r="1.5"/><circle cx="120" cy="90" r="1.5"/><circle cx="140" cy="90" r="1.5"/>
  </g>

  <!-- Table border walls -->
  <rect x="24" y="16" width="134" height="160" fill="none" stroke="#5580aa" stroke-width="2" rx="4" opacity="0.6"/>
  <!-- Launch lane -->
  <rect x="158" y="16" width="18" height="160" fill="#06091a" stroke="#224466" stroke-width="1.5" opacity="0.8"/>
  <!-- Deflector at top of lane -->
  <line x1="176" y1="24" x2="158" y2="36" stroke="#6699cc" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Rollover lanes (top) -->
  <rect x="30" y="34" width="24" height="6" fill="#00aaff" rx="2" opacity="0.8"/>
  <rect x="62" y="34" width="30" height="6" fill="#00aaff" rx="2" opacity="0.8"/>
  <rect x="100" y="34" width="24" height="6" fill="#0044aa" rx="2" opacity="0.5"/>

  <!-- Slingshot fills -->
  <polygon points="24,100 50,115 24,130" fill="#ff8800" opacity="0.25"/>
  <polygon points="158,100 132,115 158,130" fill="#ff8800" opacity="0.25"/>
  <!-- Slingshot lines -->
  <line x1="24" y1="100" x2="50" y2="115" stroke="#ff8800" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="50" y1="115" x2="24" y2="130" stroke="#ff8800" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="158" y1="100" x2="132" y2="115" stroke="#ff8800" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="132" y1="115" x2="158" y2="130" stroke="#ff8800" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Pop bumpers -->
  <g filter="url(#glow)">
    <circle cx="91" cy="62" r="14" fill="url(#bmpG)" stroke="#ff44ff" stroke-width="2.5"/>
    <circle cx="69" cy="82" r="14" fill="url(#bmpG)" stroke="#cc00ff" stroke-width="2.5"/>
    <circle cx="113" cy="82" r="14" fill="url(#bmpG)" stroke="#cc00ff" stroke-width="2.5"/>
    <!-- Shine -->
    <circle cx="86" cy="57" r="4" fill="white" opacity="0.35"/>
    <circle cx="64" cy="77" r="4" fill="white" opacity="0.35"/>
    <circle cx="108" cy="77" r="4" fill="white" opacity="0.35"/>
  </g>

  <!-- Drop targets row -->
  <g fill="#00ffcc" opacity="0.85">
    <rect x="38" y="104" width="8" height="18" rx="1"/>
    <rect x="53" y="104" width="8" height="18" rx="1"/>
    <rect x="68" y="104" width="8" height="18" rx="1"/>
    <rect x="83" y="104" width="8" height="18" rx="1"/>
    <rect x="98" y="104" width="8" height="18" rx="1"/>
  </g>
  <!-- One hit target -->
  <rect x="53" y="104" width="8" height="18" rx="1" fill="#0d3a30" opacity="0.9"/>

  <!-- Gutter diagonals -->
  <line x1="24" y1="130" x2="42" y2="155" stroke="#8aa8c8" stroke-width="2" stroke-linecap="round"/>
  <line x1="158" y1="130" x2="140" y2="155" stroke="#8aa8c8" stroke-width="2" stroke-linecap="round"/>

  <!-- Flippers -->
  <g filter="url(#glow)">
    <line x1="42" y1="158" x2="82" y2="150" stroke="#88aadd" stroke-width="8" stroke-linecap="round"/>
    <line x1="140" y1="158" x2="100" y2="150" stroke="#88aadd" stroke-width="8" stroke-linecap="round"/>
    <!-- Flipper inner highlight -->
    <line x1="42" y1="158" x2="82" y2="150" stroke="rgba(180,220,255,0.4)" stroke-width="3" stroke-linecap="round"/>
    <line x1="140" y1="158" x2="100" y2="150" stroke="rgba(180,220,255,0.4)" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Ball (chrome) -->
  <circle cx="167" cy="152" r="8" fill="url(#ballG)" filter="url(#glow)"/>
  <circle cx="164" cy="149" r="2.5" fill="white" opacity="0.75"/>

  <!-- Title text -->
  <text x="91" y="190" text-anchor="middle" font-family="monospace" font-weight="700" font-size="10" fill="#ff44ff" filter="url(#glow)" letter-spacing="1">PINBALL WIZARD</text>
</svg>
