<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1d2548"/>
      <stop offset="100%" stop-color="#f08e62"/>
    </linearGradient>
    <linearGradient id="rockShade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2c2438"/>
      <stop offset="100%" stop-color="#5d4a64"/>
    </linearGradient>
    <linearGradient id="rockSun" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#806a4c"/>
      <stop offset="100%" stop-color="#c4955f"/>
    </linearGradient>
    <linearGradient id="snowGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dcd2e4"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe1a8" stop-opacity="1"/>
      <stop offset="80%" stop-color="#ff944a" stop-opacity="0.0"/>
    </radialGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="0.6"/></filter>
  </defs>

  <!-- Sky -->
  <rect width="200" height="200" fill="url(#sky)"/>

  <!-- Sun glow behind summit -->
  <circle cx="155" cy="58" r="48" fill="url(#sun)"/>
  <circle cx="155" cy="58" r="14" fill="#ffe2a4"/>

  <!-- Distant ridges -->
  <path d="M 0 130 L 30 100 L 60 120 L 90 95 L 130 118 L 170 90 L 200 110 L 200 200 L 0 200 Z" fill="#3a3055" opacity="0.65"/>
  <path d="M 0 150 L 40 130 L 75 145 L 115 125 L 145 140 L 200 128 L 200 200 L 0 200 Z" fill="#26213a" opacity="0.85"/>

  <!-- Main mountain (granite tower with snowcap) -->
  <path d="M 50 170 L 100 30 L 150 170 Z" fill="url(#rockSun)"/>
  <path d="M 100 30 L 150 170 L 100 170 Z" fill="url(#rockShade)"/>
  <!-- Snow cap -->
  <path d="M 86 65 L 100 30 L 114 65 L 108 75 L 100 70 L 92 76 Z" fill="url(#snowGrad)" filter="url(#soft)"/>
  <!-- Snow drift down -->
  <path d="M 78 92 L 100 70 L 122 92 L 116 100 L 108 95 L 100 100 L 92 95 Z" fill="#f4eaf2" opacity="0.85"/>

  <!-- Cave entrances (warm glow) -->
  <ellipse cx="76" cy="118" rx="6" ry="8" fill="#1a0e08"/>
  <ellipse cx="76" cy="118" rx="3" ry="5" fill="#ffae4a" opacity="0.85"/>
  <ellipse cx="128" cy="138" rx="6" ry="8" fill="#1a0e08"/>
  <ellipse cx="128" cy="138" rx="3" ry="5" fill="#ffae4a" opacity="0.85"/>

  <!-- Flag at summit -->
  <line x1="100" y1="22" x2="100" y2="42" stroke="#3a2418" stroke-width="1.6"/>
  <polygon points="100,22 116,26 100,32" fill="#ffd24a"/>

  <!-- Base camp tents -->
  <polygon points="22,178 38,178 30,168" fill="#d33b2a"/>
  <polygon points="160,178 176,178 168,168" fill="#3387d6"/>
  <!-- Campfire -->
  <polygon points="82,180 90,180 86,170" fill="#ff7e2a"/>
  <polygon points="83,180 89,180 86,174" fill="#ffd24a"/>

  <!-- Tree silhouettes -->
  <polygon points="48,178 54,178 51,168" fill="#1f4d2c"/>
  <polygon points="135,178 141,178 138,168" fill="#1f4d2c"/>
  <polygon points="146,178 152,178 149,168" fill="#1f4d2c"/>

  <!-- Climber on the wall -->
  <g transform="translate(102 110)">
    <!-- Backpack -->
    <rect x="-6" y="-2" width="12" height="14" rx="3" fill="#3b6638"/>
    <rect x="-7" y="-4" width="14" height="3" fill="#c97746"/>
    <!-- Body -->
    <polygon points="-4,-7 4,-7 5,5 -5,5" fill="#c0392b"/>
    <rect x="-5" y="4" width="10" height="3" fill="#2a2a2a"/>
    <rect x="-1" y="4" width="2" height="3" fill="#e6c34a"/>
    <!-- Arms reaching -->
    <line x1="-3" y1="-7" x2="-7" y2="-16" stroke="#922b21" stroke-width="2.6" stroke-linecap="round"/>
    <line x1=" 3" y1="-7" x2=" 8" y2="-15" stroke="#922b21" stroke-width="2.6" stroke-linecap="round"/>
    <!-- Ice axes -->
    <line x1="-7" y1="-16" x2="-12" y2="-22" stroke="#5a3a18" stroke-width="1.5"/>
    <line x1="-12" y1="-22" x2="-15" y2="-21" stroke="#9aa" stroke-width="1.4"/>
    <line x1="8" y1="-15" x2="14" y2="-22" stroke="#5a3a18" stroke-width="1.5"/>
    <line x1="14" y1="-22" x2="17" y2="-21" stroke="#9aa" stroke-width="1.4"/>
    <!-- Legs -->
    <line x1="-3" y1="6" x2="-5" y2="16" stroke="#3b3b3b" stroke-width="2.6" stroke-linecap="round"/>
    <line x1=" 3" y1="6" x2=" 5" y2="16" stroke="#3b3b3b" stroke-width="2.6" stroke-linecap="round"/>
    <!-- Boots -->
    <ellipse cx="-6" cy="17" rx="3" ry="1.6" fill="#1a1a1a"/>
    <ellipse cx=" 6" cy="17" rx="3" ry="1.6" fill="#1a1a1a"/>
    <!-- Head + helmet -->
    <circle cx="0" cy="-11" r="3.6" fill="#e8c6a0"/>
    <path d="M -4 -11 Q 0 -17 4 -11 L 4 -12.5 L -4 -12.5 Z" fill="#d33b2a"/>
    <rect x="-3" y="-12.4" width="6" height="1.4" fill="#1a1a1a"/>
    <rect x="-2.5" y="-12.1" width="2" height="0.9" fill="#5fb8ff"/>
    <rect x="0.5" y="-12.1" width="2" height="0.9" fill="#5fb8ff"/>
    <!-- Rope down to anchor -->
    <path d="M 0 8 Q 4 28 -4 56" stroke="#d8c25a" stroke-width="1.4" fill="none"/>
    <circle cx="-4" cy="56" r="1.6" fill="#ffd24a"/>
  </g>
</svg>
