    <circle cx="6" cy="-29.5" r="5" fill="rgba(255,216,90,0.35)"/>
    <circle cx="6" cy="-29.5" r="2.2" fill="#fff6d0"/>
  </g>

  <!-- blue drum barrel with staves and metal hoops -->
  <g transform="translate(172,74)">
    <ellipse cx="0" cy="15" rx="12" ry="4.4" fill="rgba(20,40,28,0.3)"/>
    <path d="M-10 -9 h20 v20 a6 6 0 0 1 -6 6 h-8 a6 6 0 0 1 -6 -6 z" fill="#3f8fe0"/>
    <path d="M-10 -9 h6 v26 h-2 a6 6 0 0 1 -4 -6 z" fill="#1d4d8c"/>
    <path d="M-1 -9 h4 v26 h-4 z" fill="#7cbcf5"/>
    <g stroke="rgba(10,30,60,0.22)" stroke-width="0.7"><path d="M-6 -9 v26 M6 -9 v26"/></g>
    <rect x="-10" y="-4" width="20" height="3.4" fill="#cfe3ff"/>
    <rect x="-10" y="7" width="20" height="3.4" fill="#cfe3ff"/>
    <ellipse cx="0" cy="-9" rx="10" ry="4" fill="#cfe3ff"/>
    <ellipse cx="0" cy="-9" rx="7.6" ry="2.9" fill="#7cbcf5"/>
    <ellipse cx="-2.4" cy="-10" rx="3.4" ry="1.2" fill="rgba(255,255,255,0.55)"/>
