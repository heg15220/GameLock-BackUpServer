    </g>
    <circle cx="-5.6" cy="-8.6" r="2.7" fill="#4a2d16"/><circle cx="-5.6" cy="-8.3" r="1.5" fill="#c98a86"/>
    <circle cx="5.6" cy="-8.6" r="2.7" fill="#4a2d16"/><circle cx="5.6" cy="-8.3" r="1.5" fill="#c98a86"/>
    <ellipse cx="0" cy="-4.4" rx="8" ry="8.6" fill="url(#tm-brown)"/>
    <path d="M-7.6 -6 a8 8.6 0 0 1 6 -7" stroke="rgba(255,222,180,0.45)" stroke-width="1.2" fill="none"/>
