<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" fill="none">
  <defs>
    <linearGradient id="tm-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9fdcff"/>
      <stop offset="100%" stop-color="#e9f8ef"/>
    </linearGradient>
    <radialGradient id="tm-sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(255,247,214,0.95)"/>
      <stop offset="100%" stop-color="rgba(255,247,214,0)"/>
    </radialGradient>
    <linearGradient id="tm-pit" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#160d06"/>
      <stop offset="70%" stop-color="#2e1d10"/>
      <stop offset="100%" stop-color="#3a2617"/>
    </linearGradient>
    <radialGradient id="tm-brown" cx="34%" cy="30%" r="76%">
      <stop offset="0%" stop-color="#a97645"/>
      <stop offset="55%" stop-color="#8a5a34"/>
      <stop offset="100%" stop-color="#4a2d16"/>
    </radialGradient>
    <radialGradient id="tm-gold" cx="34%" cy="28%" r="76%">
      <stop offset="0%" stop-color="#fff0b8"/>
      <stop offset="55%" stop-color="#ffd75e"/>
      <stop offset="100%" stop-color="#c98908"/>
    </radialGradient>
    <radialGradient id="tm-bombg" cx="34%" cy="30%" r="76%">
      <stop offset="0%" stop-color="#6c737d"/>
      <stop offset="55%" stop-color="#4a5058"/>
      <stop offset="100%" stop-color="#15181d"/>
    </radialGradient>
    <radialGradient id="tm-head" cx="32%" cy="28%" r="78%">
      <stop offset="0%" stop-color="#f6e3c8"/>
      <stop offset="55%" stop-color="#e2c7a4"/>
      <stop offset="100%" stop-color="#b2926e"/>
    </radialGradient>
    <linearGradient id="tm-shirt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffb27a"/>
      <stop offset="55%" stop-color="#ff8a3d"/>
      <stop offset="100%" stop-color="#b4541c"/>
    </linearGradient>
    <linearGradient id="tm-mallet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff8e6f"/>
      <stop offset="55%" stop-color="#d94f37"/>
      <stop offset="100%" stop-color="#8f2f1f"/>
    </linearGradient>
    <radialGradient id="tm-vig" cx="50%" cy="55%" r="72%">
      <stop offset="55%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(12,30,20,0.32)"/>
    </radialGradient>
  </defs>

