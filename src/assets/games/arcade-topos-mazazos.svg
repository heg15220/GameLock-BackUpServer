  <g transform="translate(96,128)">
    <ellipse cx="0" cy="0" rx="14" ry="5.4" fill="rgba(20,40,28,0.3)"/>
    <ellipse cx="0" cy="0" rx="24" ry="9" fill="none" stroke="rgba(255,240,150,0.5)" stroke-width="1.6" stroke-dasharray="5 4"/>
    <path d="M-3 -16 l-5.4 16 M3 -16 l5.4 16" stroke="#8f3d10" stroke-width="4.6" stroke-linecap="round"/>
    <ellipse cx="-8.4" cy="0" rx="3.2" ry="1.7" fill="#3f2d1e"/>
    <ellipse cx="8.4" cy="0" rx="3.2" ry="1.7" fill="#3f2d1e"/>
    <path d="M-8 -8 q-2 -10 -1 -17 q9 -4 18 0 q1 7 -1 17 z" fill="url(#tm-shirt)"/>
    <rect x="-8" y="-9.6" width="16" height="2.2" fill="rgba(0,0,0,0.18)"/>
    <path d="M-6.6 -30 a8 8 0 0 0 -1.4 5" stroke="rgba(255,255,255,0.3)" stroke-width="1" fill="none"/>
    <!-- back arm -->
    <path d="M-7 -23 l-6 7" stroke="#b4541c" stroke-width="3.6" stroke-linecap="round"/>
    <!-- mallet arm + mallet mid-swing -->
    <path d="M7 -23 l6 3" stroke="#ffb27a" stroke-width="3.8" stroke-linecap="round"/>
    <path d="M13 -20 l16 -9" stroke="#8a5a2c" stroke-width="3.4" stroke-linecap="round"/>
    <rect x="26" y="-41" width="18" height="12" rx="4.5" fill="url(#tm-mallet)" stroke="#8f2f1f" stroke-width="1" transform="rotate(-30 35 -35)"/>
    <rect x="33" y="-40" width="3" height="11" fill="#f7d9a0" transform="rotate(-30 35 -35)"/>
    <path d="M9 -34 a24 24 0 0 1 19 4" stroke="rgba(255,255,255,0.5)" stroke-width="1.6" fill="none"/>
    <circle cx="0" cy="-38" r="7" fill="url(#tm-head)"/>
    <path d="M-7 -39 a7 7 0 0 1 14 -0.8 z" fill="#3f2d1e"/>
    <ellipse cx="0" cy="-31.4" rx="4.4" ry="1.4" fill="rgba(60,40,24,0.22)"/>
