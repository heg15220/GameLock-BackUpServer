    <g transform="translate(70,62)">
      <ellipse cx="0" cy="2" rx="15" ry="7" fill="#5d3f20"/>
      <ellipse cx="0" cy="0.6" rx="14.4" ry="6.6" fill="#8a6236"/>
      <ellipse cx="0" cy="0" rx="12.8" ry="5.8" fill="#6a4a2f"/>
      <ellipse cx="0" cy="0" rx="11" ry="5" fill="url(#tm-pit)"/>
    </g>
    <g transform="translate(130,62)">
      <ellipse cx="0" cy="2" rx="15" ry="7" fill="#5d3f20"/>
      <ellipse cx="0" cy="0.6" rx="14.4" ry="6.6" fill="#8a6236"/>
      <ellipse cx="0" cy="0" rx="12.8" ry="5.8" fill="#6a4a2f"/>
      <ellipse cx="0" cy="0" rx="11" ry="5" fill="url(#tm-pit)"/>
    </g>
    <g transform="translate(40,98)">
      <ellipse cx="0" cy="2.6" rx="19" ry="9" fill="#5d3f20"/>
      <ellipse cx="0" cy="0.8" rx="18.2" ry="8.4" fill="#8a6236"/>
      <ellipse cx="0" cy="0" rx="16.2" ry="7.4" fill="#6a4a2f"/>
