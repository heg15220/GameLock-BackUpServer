    <ellipse cx="-3.8" cy="-13" rx="2.2" ry="1.4" fill="rgba(255,255,255,0.7)"/>
    <ellipse cx="0" cy="-8" rx="9.6" ry="3.2" fill="none" stroke="rgba(0,0,0,0.35)" stroke-width="1.3"/>
