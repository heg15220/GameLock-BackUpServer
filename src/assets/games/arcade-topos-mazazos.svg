  <rect width="200" height="140" fill="url(#tm-vig)"/>

  <!-- HUD chips -->
  <rect x="6" y="6" width="38" height="14" rx="4.5" fill="rgba(9,26,18,0.72)" stroke="rgba(255,240,150,0.75)" stroke-width="0.8"/>
  <circle cx="14" cy="13" r="3.4" fill="#ff8a3d"/>
  <text x="30" y="16" font-family="'Segoe UI', sans-serif" font-size="7.5" font-weight="800" fill="#f4faf6" text-anchor="middle">TÚ 12</text>
  <rect x="86" y="6" width="30" height="14" rx="4.5" fill="rgba(9,26,18,0.72)"/>
  <text x="101" y="16" font-family="'Segoe UI', sans-serif" font-size="7.5" font-weight="800" fill="#f4faf6" text-anchor="middle">⏱ 30</text>
</svg>
