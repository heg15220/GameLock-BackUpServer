      <ellipse cx="0" cy="0" rx="14" ry="6.4" fill="url(#tm-pit)"/>
    </g>
  </g>

  <!-- gold mole (3 pts), popped out with paws on the rim -->
  <g transform="translate(130,62)">
    <g clip-path="none">
      <circle cx="-6.6" cy="-13" r="3.1" fill="#c98908"/><circle cx="-6.6" cy="-12.6" r="1.8" fill="#c98a86"/>
      <circle cx="6.6" cy="-13" r="3.1" fill="#c98908"/><circle cx="6.6" cy="-12.6" r="1.8" fill="#c98a86"/>
      <ellipse cx="0" cy="-8" rx="9.2" ry="10.4" fill="url(#tm-gold)"/>
      <path d="M-8.8 -10 a9.2 10.4 0 0 1 7 -8.2" stroke="rgba(255,255,255,0.6)" stroke-width="1.4" fill="none"/>
      <ellipse cx="0" cy="-4.6" rx="5.2" ry="3.9" fill="#d3aa7c"/>
      <ellipse cx="0" cy="-6.4" rx="1.6" ry="1.3" fill="#c98908"/>
      <g stroke="rgba(60,40,24,0.5)" stroke-width="0.6">
        <path d="M-1.6 -5 l-6 -1.4 M-1.6 -3.8 l-6 0.6 M1.6 -5 l6 -1.4 M1.6 -3.8 l6 0.6"/>
