    <path d="M-2 -10 l-3.4 10 M2 -10 l3.4 10" stroke="#14406e" stroke-width="3.2" stroke-linecap="round"/>
    <ellipse cx="-5.4" cy="0" rx="2.2" ry="1.2" fill="#3f2d1e"/>
    <ellipse cx="5.4" cy="0" rx="2.2" ry="1.2" fill="#3f2d1e"/>
    <path d="M-5 -10 q-1.4 -6 -0.6 -10 q5.6 -2.4 11.2 0 q0.8 4 -0.6 10 z" fill="#4aa3ff"/>
    <path d="M4 -19 l7.5 -8" stroke="#8a5a2c" stroke-width="2.4" stroke-linecap="round"/>
    <rect x="8" y="-33" width="12" height="7.6" rx="3" fill="url(#tm-mallet)" transform="rotate(-24 14 -29)"/>
    <circle cx="0" cy="-25" r="5" fill="url(#tm-head)"/>
    <path d="M-5 -26 a5 5 0 0 1 10 -0.6 z" fill="#3f2d1e"/>
