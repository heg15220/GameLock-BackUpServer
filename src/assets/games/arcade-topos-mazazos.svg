  <ellipse cx="156" cy="10" rx="46" ry="30" fill="url(#tm-sun)"/>
  <circle cx="156" cy="11" r="7" fill="rgba(255,246,214,0.9)"/>
  <g fill="rgba(255,255,255,0.72)">
    <ellipse cx="34" cy="13" rx="16" ry="6"/>
    <ellipse cx="26" cy="15" rx="8" ry="5"/>
    <ellipse cx="44" cy="15" rx="9" ry="5.5"/>
    <ellipse cx="92" cy="9" rx="11" ry="4.4"/>
    <ellipse cx="86" cy="11" rx="6" ry="3.6"/>
  </g>

  <!-- hedge + white picket fence across the back -->
  <rect x="0" y="26" width="200" height="18" fill="#4f9b5c"/>
  <rect x="0" y="26" width="200" height="4" fill="#6bb877"/>
  <rect x="0" y="42" width="200" height="2" fill="#2f6b46"/>
  <g fill="#f4faf6" stroke="#c4dccd" stroke-width="0.6">
    <rect x="6" y="28" width="5" height="16"/><rect x="26" y="28" width="5" height="16"/>
    <rect x="46" y="28" width="5" height="16"/><rect x="66" y="28" width="5" height="16"/>
    <rect x="86" y="28" width="5" height="16"/><rect x="106" y="28" width="5" height="16"/>
    <rect x="126" y="28" width="5" height="16"/><rect x="146" y="28" width="5" height="16"/>
    <rect x="166" y="28" width="5" height="16"/><rect x="186" y="28" width="5" height="16"/>
  </g>
  <rect x="0" y="31" width="200" height="2.4" fill="#f4faf6"/>
  <rect x="0" y="39" width="200" height="2.4" fill="#dfeee4"/>
  <!-- corner topiaries -->
  <circle cx="12" cy="30" r="12" fill="#4f9b5c"/><circle cx="9" cy="26" r="6" fill="#6bb877"/>
  <circle cx="188" cy="30" r="12" fill="#4f9b5c"/><circle cx="185" cy="26" r="6" fill="#6bb877"/>

  <!-- mowed checkered lawn in perspective -->
  <g>
    <path d="M50 44 h100 l42 96 h-184 z" fill="#4fb187"/>
    <path d="M50 44 h25 l-10 24 h-25 z" fill="#6fd0a6"/>
    <path d="M100 44 h25 l10 24 h-25 z" fill="#6fd0a6"/>
    <path d="M50 68 h-25 l-12 28 h29 z" fill="#6fd0a6"/>
    <path d="M75 68 h25 l4 28 h-29 z" fill="#6fd0a6"/>
    <path d="M135 68 h25 l14 28 h-29 z" fill="#6fd0a6"/>
    <path d="M42 96 h-29 l-14 32 h33 z" fill="#6fd0a6"/>
    <path d="M75 96 h29 l2 32 h-33 z" fill="#6fd0a6"/>
    <path d="M139 96 h29 l14 32 h-33 z" fill="#6fd0a6"/>
  </g>
  <g stroke="rgba(28,92,66,0.35)" stroke-width="0.8" stroke-linecap="round">
