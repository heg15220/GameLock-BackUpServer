<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-labelledby="title desc">
  <title id="title">Territory War Stick Arena</title>
  <desc id="desc">Arcade card with stick teams aiming grenades across floating platforms.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8eb6ff" />
      <stop offset="100%" stop-color="#dbeafe" />
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e" />
      <stop offset="100%" stop-color="#3f3f46" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.35" />
    </filter>
  </defs>
  <rect width="640" height="360" fill="url(#sky)" />
  <path d="M0 265 L100 210 L235 238 L360 194 L520 242 L640 210 L640 360 L0 360 Z" fill="#9fb6d1" opacity="0.52" />
