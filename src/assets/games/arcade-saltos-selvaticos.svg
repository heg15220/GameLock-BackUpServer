<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" fill="none">
  <defs>
    <linearGradient id="ss-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#57b6ea"/>
      <stop offset="45%" stop-color="#8ed2f0"/>
      <stop offset="80%" stop-color="#c9ebf3"/>
      <stop offset="100%" stop-color="#e6f4dd"/>
    </linearGradient>
    <linearGradient id="ss-grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a8cc55"/>
      <stop offset="35%" stop-color="#8fba43"/>
      <stop offset="100%" stop-color="#63913a"/>
    </linearGradient>
    <linearGradient id="ss-trunk" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4d3620"/>
      <stop offset="42%" stop-color="#8a6440"/>
      <stop offset="75%" stop-color="#6d4c2c"/>
      <stop offset="100%" stop-color="#3f2c19"/>
    </linearGradient>
    <radialGradient id="ss-sun" cx="0.82" cy="0.08" r="0.55">
      <stop offset="0%" stop-color="#fffad2" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#fffad2" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="200" height="140" fill="url(#ss-sky)"/>
  <rect width="200" height="140" fill="url(#ss-sun)"/>

  <!-- clouds -->
  <g fill="#ffffff" fill-opacity="0.92">
    <g><ellipse cx="36" cy="20" rx="15" ry="7"/><ellipse cx="26" cy="23" rx="9" ry="5"/><ellipse cx="47" cy="23" rx="10" ry="6"/><ellipse cx="38" cy="15" rx="9" ry="6"/></g>
    <g><ellipse cx="150" cy="15" rx="13" ry="6"/><ellipse cx="141" cy="18" rx="8" ry="4"/><ellipse cx="160" cy="18" rx="9" ry="5"/></g>
  </g>

  <!-- far band: hazy pale trees -->
  <g fill="#c3ddb4">
    <g><rect x="15" y="60" width="3" height="30"/><ellipse cx="16" cy="58" rx="12" ry="9"/></g>
    <g><rect x="48" y="56" width="3" height="34"/><ellipse cx="49" cy="54" rx="13" ry="10"/></g>
    <g><rect x="86" y="60" width="3" height="30"/><ellipse cx="87" cy="58" rx="12" ry="9"/></g>
    <g><rect x="128" y="55" width="3" height="35"/><ellipse cx="129" cy="53" rx="13" ry="10"/></g>
    <g><rect x="170" y="59" width="3" height="31"/><ellipse cx="171" cy="57" rx="12" ry="9"/></g>
  </g>

  <!-- mid band -->
  <g fill="#93c47c">
    <g><rect x="32" y="62" width="4" height="33"/><ellipse cx="34" cy="60" rx="14" ry="10"/><ellipse cx="26" cy="65" rx="9" ry="7"/><ellipse cx="42" cy="64" rx="10" ry="7"/></g>
    <g><rect x="106" y="60" width="4" height="35"/><ellipse cx="108" cy="58" rx="15" ry="11"/><ellipse cx="99" cy="63" rx="9" ry="7"/><ellipse cx="117" cy="62" rx="10" ry="7"/></g>
    <g><rect x="184" y="63" width="4" height="32"/><ellipse cx="186" cy="61" rx="14" ry="10"/><ellipse cx="177" cy="66" rx="9" ry="7"/></g>
  </g>
  <!-- a palm for texture -->
  <g stroke="#8a7050" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M67 96 Q69 78 73 62"/>
  </g>
  <g fill="#7bb463">
    <ellipse cx="66" cy="60" rx="9" ry="3.4" transform="rotate(-28 66 60)"/>
    <ellipse cx="80" cy="60" rx="9" ry="3.4" transform="rotate(28 80 60)"/>
    <ellipse cx="72" cy="56" rx="8" ry="3.2"/>
    <ellipse cx="64" cy="66" rx="8" ry="3" transform="rotate(-52 64 66)"/>
    <ellipse cx="82" cy="66" rx="8" ry="3" transform="rotate(52 82 66)"/>
  </g>

  <!-- near band -->
  <g fill="#4f9c3c">
    <g><ellipse cx="8" cy="72" rx="16" ry="12"/><rect x="6" y="72" width="5" height="26" fill="#5f4529"/></g>
    <g><ellipse cx="196" cy="70" rx="16" ry="12"/><rect x="193" y="70" width="5" height="28" fill="#5f4529"/></g>
  </g>

  <!-- grass floor + bushes at the treeline -->
  <rect x="0" y="96" width="200" height="44" fill="url(#ss-grass)"/>
  <g fill="#4a8a37">
    <ellipse cx="20" cy="97" rx="11" ry="5"/><ellipse cx="58" cy="98" rx="9" ry="4"/>
    <ellipse cx="120" cy="97" rx="12" ry="5"/><ellipse cx="163" cy="98" rx="10" ry="4"/>
  </g>
  <g stroke="#69963480" stroke-width="1.4" stroke-linecap="round">
    <path d="M30 118 l-3 -5 M30 118 l3 -4"/><path d="M74 128 l-3 -5 M74 128 l3 -4"/>
    <path d="M112 114 l-3 -5 M112 114 l3 -4"/><path d="M148 126 l-3 -5 M148 126 l3 -4"/>
    <path d="M186 116 l-3 -5 M186 116 l3 -4"/>
  </g>

  <!-- launch tree with platform and the vine's branch -->
  <ellipse cx="44" cy="97" rx="19" ry="3" fill="#3c501e" fill-opacity="0.2"/>
  <path d="M36 97 Q40 66 41 34 L50 34 Q52 66 55 97 Z" fill="url(#ss-trunk)"/>
  <path d="M30 97 Q39 92 45 97 Q51 92 61 97 Z" fill="#4a331d"/>
  <path d="M45 32 Q68 24 92 34" stroke="#5b3f26" stroke-width="4" stroke-linecap="round" fill="none"/>
  <g fill="#3f8733">
    <ellipse cx="46" cy="24" rx="20" ry="13"/><ellipse cx="33" cy="30" rx="12" ry="9"/>
    <ellipse cx="60" cy="29" rx="13" ry="9"/><ellipse cx="98" cy="30" rx="13" ry="9"/>
  </g>
  <ellipse cx="40" cy="18" rx="10" ry="6" fill="#5cb045"/>
  <rect x="52" y="56" width="26" height="4" rx="1.5" fill="#d0a06a"/>
  <rect x="52" y="59" width="26" height="2.5" rx="1" fill="#8a5f31"/>
  <rect x="63" y="61" width="4" height="36" fill="#6d4c2c"/>

  <!-- release cue at the platform's height -->
  <path d="M78 58 H118" stroke="#facc15" stroke-opacity="0.8" stroke-width="2" stroke-dasharray="5 5"/>
  <circle cx="114" cy="58" r="6" fill="none" stroke="#facc15" stroke-width="2.4"/>

  <!-- the vine and the swinger caught in the release window -->
  <path d="M92 34 Q104 46 114 58" stroke="#4b7f2f" stroke-width="3.4" stroke-linecap="round" fill="none"/>
  <path d="M92 34 Q104 46 114 58" stroke="#a3d678" stroke-opacity="0.55" stroke-width="1.2" fill="none"/>
  <g transform="translate(114 58) rotate(26)">
    <path d="M-2 11 L0 1 M2 11 L0 1" stroke="#f4c89a" stroke-width="2.4" stroke-linecap="round"/>
    <path d="M-1.5 20 L-3.5 26 L-1.5 31 M1.5 20 L4 26 L6.5 30" stroke="#0e7490" stroke-width="3" stroke-linecap="round" fill="none"/>
    <rect x="-4" y="10" width="8" height="11" rx="4" fill="#22d3ee"/>
    <circle cx="0" cy="6" r="4.6" fill="#f4c89a"/>
    <rect x="-4.6" y="3.4" width="9.2" height="2.2" rx="1.1" fill="#3f7f2c"/>
  </g>

  <!-- rival marks down the landing strip -->
  <g stroke="#ffffff" stroke-opacity="0.8" stroke-width="1.6">
    <path d="M140 97 v-10"/><path d="M164 97 v-10"/><path d="M184 97 v-10"/>
  </g>
  <path d="M140 87 l8 2 l-8 2 z" fill="#f59e0b"/>
  <path d="M164 87 l8 2 l-8 2 z" fill="#a3e635"/>
  <path d="M184 87 l8 2 l-8 2 z" fill="#f472b6"/>

  <!-- HUD echo: scoreboard left, record right -->
  <g>
    <rect x="5" y="5" width="46" height="9" rx="4.5" fill="#ffffff" fill-opacity="0.85"/>
    <circle cx="11" cy="9.5" r="2.4" fill="#22d3ee"/>
    <rect x="5" y="16" width="46" height="9" rx="4.5" fill="#ffffff" fill-opacity="0.7"/>
    <circle cx="11" cy="20.5" r="2.4" fill="#f59e0b"/>
    <rect x="150" y="5" width="45" height="9" rx="4.5" fill="#ffffff" fill-opacity="0.85"/>
    <path d="M157 7 h5 v3 a2.5 2.5 0 0 1 -5 0 z" fill="#eab308"/>
  </g>
</svg>
