<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" fill="none">
  <defs>
    <linearGradient id="pe-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#060a14"/>
    </linearGradient>
    <radialGradient id="pe-glow" cx="50%" cy="46%" r="60%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.30"/>
      <stop offset="55%" stop-color="#22d3ee" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pe-ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="pe-blur" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.4"/>
    </filter>
  </defs>

  <rect width="200" height="140" fill="url(#pe-bg)"/>
  <rect width="200" height="140" fill="url(#pe-glow)"/>

  <!-- stopwatch crown -->
  <rect x="92" y="16" width="16" height="9" rx="2.5" fill="#334155"/>
  <rect x="96" y="9" width="8" height="8" rx="2" fill="#475569"/>

  <!-- dial -->
  <circle cx="100" cy="76" r="47" fill="#0e1626" stroke="url(#pe-ring)" stroke-width="3.2"/>
  <circle cx="100" cy="76" r="47" fill="none" stroke="#67e8f9" stroke-width="3.2" opacity="0.5" filter="url(#pe-blur)"/>

  <!-- tick marks -->
  <g stroke="#3b4a63" stroke-width="1.6" stroke-linecap="round">
    <line x1="100" y1="34" x2="100" y2="41"/>
    <line x1="100" y1="111" x2="100" y2="118"/>
    <line x1="58" y1="76" x2="65" y2="76"/>
    <line x1="135" y1="76" x2="142" y2="76"/>
  </g>

  <!-- target marker (the moment to hit) -->
  <g transform="rotate(54 100 76)">
    <line x1="100" y1="30" x2="100" y2="44" stroke="#f97316" stroke-width="3.4" stroke-linecap="round"/>
    <line x1="100" y1="30" x2="100" y2="44" stroke="#fdba74" stroke-width="3.4" stroke-linecap="round" opacity="0.6" filter="url(#pe-blur)"/>
  </g>

  <!-- hand -->
  <g transform="rotate(28 100 76)">
    <line x1="100" y1="76" x2="100" y2="40" stroke="#e2e8f0" stroke-width="2.6" stroke-linecap="round"/>
  </g>
  <circle cx="100" cy="76" r="4.4" fill="#67e8f9"/>

  <!-- readout -->
  <text x="100" y="82" text-anchor="middle" font-family="'Courier New', monospace" font-size="16" font-weight="700" fill="#67e8f9" opacity="0.16">00.00</text>

  <!-- title chip -->
  <text x="100" y="132" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#cbd5e1" letter-spacing="1.5">PULSO EXACTO</text>
</svg>
