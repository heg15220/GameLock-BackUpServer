<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" fill="none">
  <!-- Gym background -->
  <rect width="200" height="140" fill="#111828"/>
  <!-- Court floor -->
  <rect x="0" y="70" width="200" height="70" fill="#b87830"/>
  <!-- Floor planks -->
  <line x1="0" y1="80" x2="200" y2="80" stroke="#a06820" stroke-width="0.8"/>
  <line x1="0" y1="90" x2="200" y2="90" stroke="#a06820" stroke-width="0.8"/>
  <line x1="0" y1="100" x2="200" y2="100" stroke="#a06820" stroke-width="0.8"/>
  <line x1="0" y1="110" x2="200" y2="110" stroke="#a06820" stroke-width="0.8"/>
  <line x1="0" y1="120" x2="200" y2="120" stroke="#a06820" stroke-width="0.8"/>
  <!-- Court lines (perspective) -->
  <!-- 3-point arc suggestion -->
  <ellipse cx="80" cy="72" rx="55" ry="18" stroke="rgba(255,255,255,0.75)" stroke-width="1.5" fill="none" clip-path="url(#halfArc)"/>
  <clipPath id="halfArc"><rect x="25" y="72" width="110" height="36"/></clipPath>
  <!-- Paint area -->
  <rect x="65" y="70" width="30" height="30" fill="rgba(180,55,18,0.3)" stroke="rgba(255,255,255,0.7)" stroke-width="1"/>
  <!-- Free throw line -->
  <line x1="65" y1="100" x2="95" y2="100" stroke="rgba(255,255,255,0.75)" stroke-width="1"/>
  <!-- Corner 3 lines -->
  <line x1="26" y1="70" x2="26" y2="82" stroke="rgba(255,255,255,0.75)" stroke-width="1"/>
  <line x1="134" y1="70" x2="134" y2="82" stroke="rgba(255,255,255,0.75)" stroke-width="1"/>
  <!-- Horizon line -->
  <line x1="0" y1="70" x2="200" y2="70" stroke="rgba(150,110,50,0.5)" stroke-width="1"/>

  <!-- Basket support pole -->
  <rect x="78" y="28" width="4" height="45" fill="#606878" rx="1"/>
  <!-- Horizontal arm -->
  <rect x="78" y="28" width="25" height="3" fill="#606878" rx="1"/>
  <!-- Backboard -->
  <rect x="100" y="20" width="22" height="16" fill="rgba(230,240,255,0.88)" stroke="#b0bcc8" stroke-width="1.5" rx="1"/>
  <!-- Shooting box on backboard -->
  <rect x="105" y="24" width="12" height="8" fill="none" stroke="rgba(255,40,40,0.8)" stroke-width="1"/>
  <!-- Rim -->
  <ellipse cx="97" cy="38" rx="8" ry="3" fill="none" stroke="#e05500" stroke-width="2.5"/>
  <!-- Net simplified -->
  <line x1="90" y1="38" x2="91" y2="48" stroke="rgba(220,225,230,0.6)" stroke-width="1"/>
  <line x1="93" y1="39" x2="93" y2="49" stroke="rgba(220,225,230,0.6)" stroke-width="1"/>
  <line x1="97" y1="40" x2="96" y2="50" stroke="rgba(220,225,230,0.6)" stroke-width="1"/>
  <line x1="101" y1="39" x2="100" y2="49" stroke="rgba(220,225,230,0.6)" stroke-width="1"/>
  <line x1="104" y1="38" x2="103" y2="48" stroke="rgba(220,225,230,0.6)" stroke-width="1"/>
  <ellipse cx="97" cy="49" rx="5" ry="2" fill="none" stroke="rgba(220,225,230,0.5)" stroke-width="0.8"/>

  <!-- Basketball ball -->
  <circle cx="40" cy="55" r="14" fill="#d84e0c"/>
  <circle cx="40" cy="55" r="14" fill="url(#ballGrad)"/>
  <defs>
    <radialGradient id="ballGrad" cx="35%" cy="35%">
      <stop offset="0%" stop-color="#ff8c28"/>
      <stop offset="60%" stop-color="#d84e0c"/>
      <stop offset="100%" stop-color="#8a2400"/>
    </radialGradient>
  </defs>
  <!-- Ball seams -->
  <ellipse cx="40" cy="55" rx="14" ry="14" fill="none" stroke="rgba(0,0,0,0.38)" stroke-width="1"/>
  <ellipse cx="40" cy="55" rx="4" ry="14" fill="none" stroke="rgba(0,0,0,0.38)" stroke-width="1"/>
  <line x1="26" y1="55" x2="54" y2="55" stroke="rgba(0,0,0,0.38)" stroke-width="1"/>
  <!-- Ball specular -->
  <ellipse cx="34" cy="48" rx="4" ry="3" fill="rgba(255,255,200,0.25)"/>

  <!-- Shot arc preview dots -->
  <circle cx="57" cy="51" r="1.5" fill="rgba(255,210,50,0.7)"/>
  <circle cx="70" cy="46" r="1.5" fill="rgba(255,210,50,0.7)"/>
  <circle cx="83" cy="43" r="1.5" fill="rgba(255,210,50,0.7)"/>
  <circle cx="93" cy="41" r="1.5" fill="rgba(255,210,50,0.85)"/>
</svg>
