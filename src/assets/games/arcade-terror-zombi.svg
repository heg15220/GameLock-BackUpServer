<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" fill="none">
  <defs>
    <linearGradient id="tz-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b4a52"/>
      <stop offset="55%" stop-color="#465049"/>
      <stop offset="100%" stop-color="#2e3a2f"/>
    </linearGradient>
    <radialGradient id="tz-ground" cx="50%" cy="42%" r="72%">
      <stop offset="0%" stop-color="#8a9663"/>
      <stop offset="70%" stop-color="#6e7a4c"/>
      <stop offset="100%" stop-color="#525c39"/>
    </radialGradient>
    <radialGradient id="tz-moon" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(226,232,240,0.45)"/>
      <stop offset="100%" stop-color="rgba(226,232,240,0)"/>
    </radialGradient>
  </defs>

  <rect width="200" height="140" fill="url(#tz-sky)"/>

  <!-- moon glow -->
  <rect x="120" y="0" width="80" height="60" fill="url(#tz-moon)"/>
  <circle cx="164" cy="20" r="9" fill="#e8edf2"/>

  <!-- leafy tree ring -->
  <g>
    <circle cx="26" cy="24" r="20" fill="#1f2b1d"/>
    <circle cx="70" cy="18" r="19" fill="#1f2b1d"/>
    <circle cx="116" cy="18" r="20" fill="#1f2b1d"/>
    <circle cx="160" cy="24" r="18" fill="#1f2b1d"/>
    <circle cx="12" cy="70" r="18" fill="#1f2b1d"/>
    <circle cx="190" cy="72" r="18" fill="#1f2b1d"/>
    <circle cx="40" cy="20" r="9" fill="rgba(90,110,75,0.5)"/>
    <circle cx="104" cy="14" r="8" fill="rgba(90,110,75,0.5)"/>
  </g>

  <!-- cemetery grass -->
  <rect x="22" y="30" width="156" height="96" rx="9" fill="url(#tz-ground)"/>

  <!-- fence -->
  <g stroke="#171c18" stroke-linecap="round">
    <rect x="22" y="30" width="156" height="96" rx="9" fill="none" stroke-width="2"/>
    <g stroke-width="2">
      <path d="M30 30 v-5 M42 30 v-5 M54 30 v-5 M66 30 v-5 M78 30 v-5 M90 30 v-5 M110 30 v-5 M122 30 v-5 M134 30 v-5 M146 30 v-5 M158 30 v-5 M170 30 v-5"/>
      <path d="M30 126 v5 M42 126 v5 M54 126 v5 M66 126 v5 M78 126 v5 M122 126 v5 M134 126 v5 M146 126 v5 M158 126 v5 M170 126 v5"/>
    </g>
  </g>

  <!-- arched double gate (front) -->
  <g stroke="#171c18" stroke-width="1.6" fill="none">
    <path d="M92 126 v-12 l-4 -2 v14 z"/>
    <path d="M108 126 v-12 l4 -2 v14 z"/>
    <path d="M88 112 a12 12 0 0 1 24 0"/>
  </g>

  <!-- headstones -->
  <g>
    <g transform="translate(64,66)">
      <ellipse cx="1" cy="9" rx="9" ry="2.4" fill="rgba(20,30,20,0.4)"/>
      <path d="M-7 9 v-10 a7 7 0 0 1 14 0 v10 z" fill="#9aa0a6"/>
      <path d="M0 -3 v8 M-3 0 h6" stroke="#6f757c" stroke-width="1.3"/>
    </g>
    <g transform="translate(112,60)">
      <ellipse cx="1" cy="8" rx="8" ry="2.2" fill="rgba(20,30,20,0.4)"/>
      <rect x="-7" y="-9" width="14" height="17" rx="2" fill="#9aa0a6"/>
      <path d="M0 -4 v8 M-3 -1 h6" stroke="#6f757c" stroke-width="1.3"/>
    </g>
    <g transform="translate(140,90)">
      <ellipse cx="1" cy="9" rx="9" ry="2.4" fill="rgba(20,30,20,0.4)"/>
      <path d="M-7 9 v-10 a7 7 0 0 1 14 0 v10 z" fill="#b7bcc2"/>
    </g>
    <g transform="translate(88,96)">
      <ellipse cx="1" cy="7" rx="7" ry="2" fill="rgba(20,30,20,0.4)"/>
      <path d="M-6 7 v-8 a6 6 0 0 1 12 0 v8 z" fill="#9aa0a6"/>
    </g>
  </g>

  <defs>
    <radialGradient id="tz-head-light" cx="66%" cy="34%" r="70%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.28)"/>
      <stop offset="55%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.22)"/>
    </radialGradient>
  </defs>

  <!-- centre zombie: hunched, mottled, torn shirt, hollow sockets (no cartoon face) -->
  <g transform="translate(102,80)">
    <ellipse cx="0" cy="12" rx="8" ry="2.6" fill="rgba(20,28,18,0.4)"/>
    <line x1="-2" y1="4" x2="-2.6" y2="12" stroke="#3f4a30" stroke-width="2.4" stroke-linecap="round"/>
    <line x1="2" y1="4" x2="2.6" y2="12" stroke="#3f4a30" stroke-width="2.4" stroke-linecap="round"/>
    <path d="M0 1 l9 -1 M0 1 l9 4" stroke="#8faa72" stroke-width="2.4" stroke-linecap="round"/>
    <path d="M-4.5 -2 h9 v5 l-1.6 2 l-1.6 -2 l-1.8 2.2 l-1.6 -2.2 l-1.8 2 z" fill="#586d43"/>
    <circle cx="1.5" cy="-6" r="4.6" fill="#8faa72"/>
    <circle cx="1.5" cy="-6" r="4.6" fill="url(#tz-head-light)"/>
    <ellipse cx="-0.4" cy="-6" rx="1" ry="1.4" fill="rgba(12,18,10,0.7)"/>
    <ellipse cx="3.2" cy="-6" rx="1" ry="1.4" fill="rgba(12,18,10,0.7)"/>
    <ellipse cx="1.5" cy="-3.4" rx="1.2" ry="0.8" fill="rgba(12,18,10,0.5)"/>
    <circle cx="-0.6" cy="-9.6" r="1.4" fill="#2f3a24"/>
  </g>

  <!-- fleeing survivors (faceless — form from moonlight, not features) -->
  <g transform="translate(52,56)">
    <ellipse cx="0" cy="12" rx="7" ry="2.4" fill="rgba(20,28,18,0.38)"/>
    <line x1="-2.4" y1="4" x2="-3.4" y2="12" stroke="#2b3550" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="2.4" y1="4" x2="3.4" y2="12" stroke="#2b3550" stroke-width="2.2" stroke-linecap="round"/>
    <rect x="-4.5" y="-2" width="9" height="8" rx="3" fill="#38bdf8"/>
    <rect x="-4.5" y="-2" width="4" height="8" rx="3" fill="rgba(0,0,0,0.2)"/>
    <circle cx="0" cy="-6" r="4.6" fill="#f2c9a0"/>
    <circle cx="0" cy="-6" r="4.6" fill="url(#tz-head-light)"/>
    <path d="M-4.6 -7 a4.6 4.6 0 0 1 9.2 -0.6" fill="#3a2a1a"/>
    <ellipse cx="0" cy="0" rx="9" ry="3" fill="none" stroke="#38bdf8" stroke-width="1"/>
    <path d="M0 -13 l-2.6 -3.6 h5.2 z" fill="#f8fafc"/>
  </g>
  <g transform="translate(158,58)">
    <ellipse cx="0" cy="12" rx="7" ry="2.4" fill="rgba(20,28,18,0.38)"/>
    <line x1="-2.4" y1="4" x2="-3.4" y2="12" stroke="#2b3550" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="2.4" y1="4" x2="3.4" y2="12" stroke="#2b3550" stroke-width="2.2" stroke-linecap="round"/>
    <rect x="-4.5" y="-2" width="9" height="8" rx="3" fill="#a3e635"/>
    <rect x="-4.5" y="-2" width="4" height="8" rx="3" fill="rgba(0,0,0,0.2)"/>
    <circle cx="0" cy="-6" r="4.6" fill="#f6d3b0"/>
    <circle cx="0" cy="-6" r="4.6" fill="url(#tz-head-light)"/>
    <path d="M-4.6 -7 a4.6 4.6 0 0 1 9.2 -0.6" fill="#2a2a30"/>
  </g>
  <g transform="translate(74,108)">
    <ellipse cx="0" cy="12" rx="7" ry="2.4" fill="rgba(20,28,18,0.38)"/>
    <line x1="-2.4" y1="4" x2="-3.4" y2="12" stroke="#2b3550" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="2.4" y1="4" x2="3.4" y2="12" stroke="#2b3550" stroke-width="2.2" stroke-linecap="round"/>
    <rect x="-4.5" y="-2" width="9" height="8" rx="3" fill="#fbbf24"/>
    <rect x="-4.5" y="-2" width="4" height="8" rx="3" fill="rgba(0,0,0,0.2)"/>
    <circle cx="0" cy="-6" r="4.6" fill="#c98a5e"/>
    <circle cx="0" cy="-6" r="4.6" fill="url(#tz-head-light)"/>
    <path d="M-4.6 -7 a4.6 4.6 0 0 1 9.2 -0.6" fill="#b5651d"/>
  </g>

  <rect x="6" y="8" width="26" height="10" rx="3" fill="rgba(7,17,31,0.72)"/>
  <text x="19" y="15.6" font-family="'Segoe UI', sans-serif" font-size="6" font-weight="700" fill="#67e8f9" text-anchor="middle">TÚ</text>
</svg>
